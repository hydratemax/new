<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MFire Reader</title>

<style>
body{margin:0;background:#0d0d0f;color:#fff;font-family:sans-serif;}
.screen{display:none;padding:70px 10px 80px;}
.screen.active{display:block;}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.card{background:#1a1a22;border-radius:10px;overflow:hidden;cursor:pointer;}
.card img{width:100%;height:180px;object-fit:cover;}

.topbar{
position:fixed;top:0;left:0;right:0;height:60px;
background:#111;display:flex;align-items:center;padding:0 10px;z-index:10;
}
input{flex:1;padding:8px;border-radius:20px;border:none;}

.reader{
position:fixed;inset:0;background:black;display:none;flex-direction:column;
}
.reader.open{display:flex;}
.reader img{width:100%;max-width:800px;margin:auto;}
</style>
</head>

<body>

<div class="topbar">
<input id="q" placeholder="search..." onkeydown="if(event.key==='Enter')search()">
</div>

<div id="browse" class="screen active">
<div id="grid" class="grid"></div>
</div>

<div id="reader" class="reader">
<div id="pages"></div>
</div>

<script>
const API="https://YOUR-SERVER.onrender.com";

let state={
  manga:null,
  chapters:[],
  index:0
};

async function loadTrending(){
  const r=await fetch(API+"/trending");
  const d=await r.json();
  render(d.results);
}

function render(items){
  const g=document.getElementById("grid");
  g.innerHTML="";
  const frag=document.createDocumentFragment();

  items.forEach(m=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<img src="${API}/proxy?url=${encodeURIComponent(m.cover)}"><p>${m.title}</p>`;
    div.onclick=()=>openManga(m);
    frag.appendChild(div);
  });

  g.appendChild(frag);
}

async function search(){
  const q=document.getElementById("q").value;
  const r=await fetch(API+"/search?q="+encodeURIComponent(q));
  const d=await r.json();
  render(d.results);
}

async function openManga(m){
  state.manga=m;

  const [d,c]=await Promise.all([
    fetch(API+"/manga?id="+m.id),
    fetch(API+"/chapters?id="+m.id)
  ]);

  const detail=await d.json();
  const chap=await c.json();

  state.chapters=chap.chapters;
  openReader(0);
}

async function openReader(i){
  state.index=i;
  const ch=state.chapters[i];
  const r=await fetch(API+"/pages?id="+ch.id);
  const d=await r.json();

  const pages=document.getElementById("pages");
  pages.innerHTML="";

  const frag=document.createDocumentFragment();

  d.images.forEach(src=>{
    const img=document.createElement("img");
    img.src=src;
    frag.appendChild(img);
  });

  pages.appendChild(frag);
  document.getElementById("reader").classList.add("open");
}

loadTrending();
</script>

</body>
</html>
