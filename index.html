<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Reader</title>

<style>
body {
  margin: 0;
  background: #0d0d0f;
  color: white;
  font-family: Arial;
}

.top {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 10px;
  background: #111;
  display: flex;
  gap: 10px;
  z-index: 10;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

.grid {
  margin-top: 70px;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: #1a1a22;
  border-radius: 10px;
  overflow: hidden;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card p {
  font-size: 12px;
  padding: 5px;
}

.reader {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  overflow-y: scroll;
}

.reader.open {
  display: block;
}

.reader img {
  width: 100%;
  max-width: 800px;
  display: block;
  margin: auto;
}

.loading {
  text-align: center;
  padding: 20px;
  color: gray;
}
</style>
</head>

<body>

<div class="top">
  <input id="searchInput" placeholder="Search..." onkeydown="if(event.key==='Enter') search()">
  <button onclick="search()">Go</button>
</div>

<div id="grid" class="grid"></div>
<div id="status" class="loading">Loading...</div>

<div id="reader" class="reader"></div>

<script>
const API = location.origin; // auto use same server

let chapters = [];

/* ───────── INIT ───────── */
loadTrending();

/* ───────── SAFE FETCH ───────── */
async function fetchJSON(url) {
  try {
    const r = await fetch(url);
    return await r.json();
  } catch {
    return null;
  }
}

/* ───────── TRENDING ───────── */
async function loadTrending() {
  const data = await fetchJSON(API + "/trending");

  const grid = document.getElementById("grid");
  const status = document.getElementById("status");

  grid.innerHTML = "";

  if (!data || !data.results) {
    status.innerText = "Server not responding";
    return;
  }

  status.innerText = "";

  data.results.forEach(m => {
    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <img src="${API}/proxy?url=${encodeURIComponent(m.cover || "")}">
      <p>${m.title}</p>
    `;

    el.onclick = () => openManga(m);
    grid.appendChild(el);
  });
}

/* ───────── SEARCH ───────── */
async function search() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) return;

  document.getElementById("status").innerText = "Searching...";

  const data = await fetchJSON(API + "/search?q=" + encodeURIComponent(q));

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  if (!data || !data.results) {
    document.getElementById("status").innerText = "Search failed";
    return;
  }

  document.getElementById("status").innerText = "";

  data.results.forEach(m => {
    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <img src="${API}/proxy?url=${encodeURIComponent(m.cover || "")}">
      <p>${m.title}</p>
    `;

    el.onclick = () => openManga(m);
    grid.appendChild(el);
  });
}

/* ───────── OPEN MANGA ───────── */
async function openManga(m) {
  const data = await fetchJSON(API + "/chapters?id=" + m.id);

  if (!data || !data.chapters || data.chapters.length === 0) {
    alert("No chapters found");
    return;
  }

  chapters = data.chapters;
  openReader(0);
}

/* ───────── READER ───────── */
async function openReader(index) {
  const ch = chapters[index];
  if (!ch) return;

  const data = await fetchJSON(API + "/pages?id=" + ch.id);

  const reader = document.getElementById("reader");
  reader.classList.add("open");
  reader.innerHTML = "";

  if (!data || !data.images || data.images.length === 0) {
    reader.innerHTML = "<p style='color:white;text-align:center'>No pages</p>";
    return;
  }

  data.images.forEach(src => {
    const img = document.createElement("img");
    img.src = API + "/proxy?url=" + encodeURIComponent(src);
    reader.appendChild(img);
  });

  // tap to close
  reader.onclick = () => reader.classList.remove("open");
}
</script>

</body>
</html>
