<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MangaVault Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: Outfit, sans-serif;
  background:#0b0b10;
  color:#fff;
}

header {
  padding:12px;
  display:flex;
  gap:10px;
  align-items:center;
  background:#111;
  position:sticky;
  top:0;
}

.logo {
  font-family:Bebas Neue;
  font-size:22px;
}

input {
  flex:1;
  padding:10px;
  border-radius:20px;
  border:none;
  outline:none;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#1a1a25;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.card img {
  width:100%;
  height:160px;
  object-fit:cover;
}

.card h4 {
  font-size:12px;
  padding:6px;
  margin:0;
}

.badge {
  font-size:10px;
  padding:2px 6px;
  background:#ff3b3b;
  position:absolute;
  margin:5px;
  border-radius:5px;
}

#status {
  padding:10px;
  font-size:12px;
  color:#aaa;
}
</style>
</head>

<body>

<header>
  <div class="logo">MangaVault</div>
  <input id="search" placeholder="Search manga...">
</header>

<div id="status">Loading...</div>
<div class="grid" id="grid"></div>

<script>
const API = "https://api.mangadex.org";
const CACHE_KEY = "mv_cache_pro";
const grid = document.getElementById("grid");
const statusEl = document.getElementById("status");

let cache = JSON.parse(localStorage.getItem(CACHE_KEY) || "null");

function fallback() {
  return [
    {
      id:"1",
      attributes:{
        title:{en:"Offline Manga Demo"},
        status:"ongoing"
      },
      relationships:[]
    },
    {
      id:"2",
      attributes:{
        title:{en:"Sample Adventure"},
        status:"completed"
      },
      relationships:[]
    }
  ];
}

function title(m) {
  return m.attributes.title.en || "No Title";
}

function cover(id) {
  return `https://uploads.mangadex.org/covers/${id}`;
}

function render(data) {
  grid.innerHTML = "";

  data.forEach(m => {
    const el = document.createElement("div");
    el.className = "card";

    el.innerHTML = `
      <div style="position:relative">
        <div class="badge">${m.attributes.status || "ongoing"}</div>
        <img src="${cover(m.id)}" onerror="this.style.display='none'">
      </div>
      <h4>${title(m)}</h4>
    `;

    grid.appendChild(el);
  });
}

async function loadManga() {
  try {
    statusEl.textContent = "Fetching MangaDex...";

    const res = await fetch(`${API}/manga?limit=18&includes[]=cover_art`);
    const json = await res.json();

    cache = json.data;
    localStorage.setItem(CACHE_KEY, JSON.stringify(cache));

    render(cache);
    statusEl.textContent = "Online";

  } catch (e) {
    console.log("API failed:", e);

    if (cache) {
      statusEl.textContent = "Offline (cached data)";
      render(cache);
    } else {
      statusEl.textContent = "Offline (fallback mode)";
      render(fallback());
    }
  }
}

// SEARCH (simple local filter)
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();

  const data = (cache || fallback()).filter(m =>
    title(m).toLowerCase().includes(q)
  );

  render(data);
});

window.addEventListener("offline", () => {
  statusEl.textContent = "No internet (offline mode)";
});

loadManga();
</script>

</body>
</html>
