<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Reader</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0d0d0f;
  color: white;
}

.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  padding: 10px;
  background: #111;
  display: flex;
  gap: 10px;
  z-index: 10;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
}

button {
  padding: 10px 14px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

#status {
  margin-top: 70px;
  text-align: center;
  color: gray;
  font-size: 14px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: #1a1a22;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card p {
  font-size: 12px;
  padding: 6px;
}

.reader {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  overflow-y: auto;
  z-index: 50;
}

.reader.open {
  display: block;
}

.reader img {
  width: 100%;
  max-width: 800px;
  display: block;
  margin: auto;
}

.loading {
  text-align: center;
  padding: 20px;
  color: gray;
}
</style>
</head>

<body>

<div class="topbar">
  <input id="searchInput" placeholder="Search manga..." onkeydown="if(event.key==='Enter') search()">
  <button onclick="search()">Search</button>
</div>

<div id="status">Loading trending...</div>
<div id="grid" class="grid"></div>

<div id="reader" class="reader"></div>

<script>
/* ─────────────────────────────
   API (FIXED — IMPORTANT)
──────────────────────────── */
const API = "https://manga-app-fjwl.onrender.com";

/* ─────────────────────────────
   GLOBAL STATE
──────────────────────────── */
let chapters = [];

/* ─────────────────────────────
   SAFE FETCH
──────────────────────────── */
async function getJSON(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
  } catch (e) {
    console.log("API ERROR:", url, e.message);
    return null;
  }
}

/* ─────────────────────────────
   INIT
──────────────────────────── */
loadTrending();

/* ─────────────────────────────
   TRENDING
──────────────────────────── */
async function loadTrending() {
  const data = await getJSON(API + "/trending");

  const grid = document.getElementById("grid");
  const status = document.getElementById("status");

  grid.innerHTML = "";

  if (!data || !data.results) {
    status.innerText = "Server not responding (check backend)";
    return;
  }

  status.innerText = "";

  data.results.forEach(m => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${API}/proxy?url=${encodeURIComponent(m.cover || "")}">
      <p>${m.title}</p>
    `;

    card.onclick = () => openManga(m);
    grid.appendChild(card);
  });
}

/* ─────────────────────────────
   SEARCH
──────────────────────────── */
async function search() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) return;

  document.getElementById("status").innerText = "Searching...";

  const data = await getJSON(API + "/search?q=" + encodeURIComponent(q));

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  if (!data || !data.results) {
    document.getElementById("status").innerText = "Search failed";
    return;
  }

  document.getElementById("status").innerText = "";

  data.results.forEach(m => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${API}/proxy?url=${encodeURIComponent(m.cover || "")}">
      <p>${m.title}</p>
    `;

    card.onclick = () => openManga(m);
    grid.appendChild(card);
  });
}

/* ─────────────────────────────
   OPEN MANGA
──────────────────────────── */
async function openManga(m) {
  document.getElementById("status").innerText = "Loading chapters...";

  const data = await getJSON(API + "/chapters?id=" + m.id);

  if (!data || !data.chapters) {
    document.getElementById("status").innerText = "Failed to load chapters";
    return;
  }

  chapters = data.chapters;
  document.getElementById("status").innerText = "";
  openReader(0);
}

/* ─────────────────────────────
   READER
──────────────────────────── */
async function openReader(index) {
  const ch = chapters[index];
  if (!ch) return;

  const data = await getJSON(API + "/pages?id=" + ch.id);

  const reader = document.getElementById("reader");
  reader.classList.add("open");
  reader.innerHTML = "";

  if (!data || !data.images || data.images.length === 0) {
    reader.innerHTML = "<p style='color:white;text-align:center'>No pages found</p>";
    return;
  }

  data.images.forEach(src => {
    const img = document.createElement("img");
    img.src = API + "/proxy?url=" + encodeURIComponent(src);
    reader.appendChild(img);
  });

  reader.onclick = () => reader.classList.remove("open");
}
</script>

</body>
</html>
