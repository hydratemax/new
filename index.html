<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KoIKMa Planner 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;0,700;1,400&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060912;
  --bg2: #0d1424;
  --bg3: #121d35;
  --card: #0f1929;
  --card2: #162035;
  --card3: #1a2840;
  --border: rgba(99,140,255,0.1);
  --border2: rgba(99,140,255,0.18);
  --border3: rgba(99,140,255,0.28);
  --text: #dde4f5;
  --text2: #6b7da8;
  --text3: #3a4a6b;
  --accent: #4f7cff;
  --accent2: #7aa0ff;
  --gold: #f0a832;
  --gold2: #ffc966;
  --sun: #ff6b6b;
  --sat: #ff9f5a;
  --hol-bg: rgba(255,80,80,0.08);
  --hol-text: #ff9999;
  --radius: 14px;
  --radius-sm: 9px;
}

* { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Manrope', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ─── ANIMATED BG ─────────────────────────────────────────────────── */
.bg-canvas {
  position: fixed; inset: 0; z-index: 0;
  overflow: hidden; pointer-events: none;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(80px); opacity: 0.5;
  animation: orbFloat linear infinite;
}
.orb1 { width:600px;height:600px; background:radial-gradient(circle,rgba(60,100,255,0.25),transparent 70%); top:-100px;left:-150px; animation-duration:22s; }
.orb2 { width:500px;height:500px; background:radial-gradient(circle,rgba(100,40,220,0.2),transparent 70%); bottom:-80px;right:-100px; animation-duration:28s; animation-direction:reverse; }
.orb3 { width:350px;height:350px; background:radial-gradient(circle,rgba(240,168,50,0.12),transparent 70%); top:40%;left:55%; animation-duration:18s; animation-delay:-8s; }
.orb4 { width:250px;height:250px; background:radial-gradient(circle,rgba(0,220,180,0.1),transparent 70%); top:20%;right:25%; animation-duration:15s; animation-delay:-4s; }

@keyframes orbFloat {
  0%,100% { transform: translate(0,0) scale(1); }
  25% { transform: translate(40px,-30px) scale(1.05); }
  50% { transform: translate(-20px,50px) scale(0.95); }
  75% { transform: translate(-50px,-20px) scale(1.02); }
}

.grid-overlay {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(79,124,255,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(79,124,255,0.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 40%, transparent 100%);
}

/* Stars */
.stars { position:fixed;inset:0;z-index:0;pointer-events:none; }
.star {
  position:absolute; background:#fff; border-radius:50%;
  animation: twinkle ease-in-out infinite;
}
@keyframes twinkle {
  0%,100%{opacity:0.1;transform:scale(1);}
  50%{opacity:0.8;transform:scale(1.5);}
}

/* ─── HEADER ──────────────────────────────────────────────────────── */
.header {
  position: sticky; top: 0; z-index: 200;
  height: 76px;
  display: flex; align-items: center; gap: 24px; padding: 0 48px;
  background: rgba(6,9,18,0.85);
  backdrop-filter: blur(24px) saturate(180%);
  border-bottom: 1px solid var(--border2);
  box-shadow: 0 1px 40px rgba(0,0,0,0.4);
}

.logo-wrap { display:flex; align-items:center; gap:14px; }
.logo-icon {
  width: 42px; height: 42px;
  background: linear-gradient(135deg, #4f7cff, #7aa0ff);
  border-radius: 10px; display:flex; align-items:center;
  justify-content:center; font-size:20px;
  box-shadow: 0 0 20px rgba(79,124,255,0.4);
  animation: logoGlow 3s ease-in-out infinite;
}
@keyframes logoGlow {
  0%,100%{box-shadow:0 0 20px rgba(79,124,255,0.4);}
  50%{box-shadow:0 0 35px rgba(79,124,255,0.7), 0 0 60px rgba(79,124,255,0.2);}
}
.logo-text {
  font-family: 'Cormorant Garamond', serif;
  font-size: 24px; font-weight: 700; letter-spacing: 0.02em;
  background: linear-gradient(135deg, #dde4f5 0%, #7aa0ff 50%, #f0a832 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; background-size: 200%;
  animation: shimmer 6s linear infinite;
}
@keyframes shimmer {
  0%{background-position:0%} 100%{background-position:200%}
}
.logo-sub {
  font-size:10px; color:var(--text2); letter-spacing:.18em;
  text-transform:uppercase; margin-top:1px;
}

/* Legend */
.legend {
  display:flex; gap:14px; align-items:center; flex-wrap:wrap;
  margin-left: 16px;
}
.leg-item { display:flex;align-items:center;gap:5px;font-size:10px;color:var(--text2);letter-spacing:.05em; cursor:pointer; transition:color .2s; }
.leg-item:hover { color:var(--text); }
.leg-dot { width:9px;height:9px;border-radius:3px;flex-shrink:0; }

.header-right { margin-left:auto; display:flex; gap:10px; align-items:center; }

.unsaved-badge {
  display:flex;align-items:center;gap:6px;
  font-size:10px; color:var(--gold); letter-spacing:.08em;
  opacity:0; transition:opacity .3s;
}
.unsaved-badge.show { opacity:1; }
.pulse-ring {
  width:8px;height:8px;border-radius:50%;background:var(--gold);
  animation:pulseRing 1.5s ease infinite;
}
@keyframes pulseRing {
  0%{box-shadow:0 0 0 0 rgba(240,168,50,.7);}
  70%{box-shadow:0 0 0 8px rgba(240,168,50,0);}
  100%{box-shadow:0 0 0 0 rgba(240,168,50,0);}
}

/* Buttons */
.btn {
  display:inline-flex;align-items:center;gap:6px;
  padding:9px 18px; border-radius:var(--radius-sm);
  font-family:'Manrope',sans-serif; font-size:11px; font-weight:700;
  cursor:pointer; border:none; transition:all .2s;
  letter-spacing:.08em; text-transform:uppercase; position:relative; overflow:hidden;
}
.btn::after {
  content:''; position:absolute; inset:0;
  background:linear-gradient(rgba(255,255,255,.08),transparent);
  opacity:0; transition:opacity .2s;
}
.btn:hover::after { opacity:1; }
.btn:active { transform:scale(0.97); }

.btn-primary {
  background: linear-gradient(135deg,#4f7cff,#6e94ff);
  color:#fff; box-shadow:0 4px 20px rgba(79,124,255,0.35);
}
.btn-primary:hover { box-shadow:0 6px 28px rgba(79,124,255,0.55); transform:translateY(-1px); }

.btn-ghost {
  background:transparent; color:var(--text2);
  border:1px solid var(--border2);
}
.btn-ghost:hover { background:var(--bg3); color:var(--text); border-color:var(--border3); }

.btn-danger {
  background:rgba(255,70,70,0.12); color:#ff7070;
  border:1px solid rgba(255,70,70,0.2);
}
.btn-danger:hover { background:rgba(255,70,70,0.22); }

/* ─── MAIN ────────────────────────────────────────────────────────── */
.main {
  position:relative; z-index:1;
  max-width:1440px; margin:0 auto;
  padding: 48px 48px 100px;
}

/* Month */
.month-section {
  margin-bottom: 64px;
  opacity:0; transform:translateY(32px);
  animation: revealUp .6s cubic-bezier(.22,1,.36,1) forwards;
}
@keyframes revealUp {
  to{opacity:1;transform:translateY(0);}
}

.month-header {
  display:flex; align-items:flex-end; justify-content:space-between;
  margin-bottom:18px; padding-bottom:18px;
  border-bottom:1px solid var(--border);
  position:relative;
}
.month-header::after {
  content:''; position:absolute; bottom:-1px; left:0;
  width:80px; height:2px;
  background:linear-gradient(90deg,var(--accent),transparent);
  border-radius:2px;
}

.month-name {
  font-family:'Cormorant Garamond',serif;
  font-size:38px; font-weight:700; color:var(--text);
  display:flex; align-items:baseline; gap:14px; letter-spacing:-.01em;
}
.month-tag {
  font-family:'Manrope',sans-serif; font-size:11px; font-weight:600;
  color:var(--accent2); background:rgba(79,124,255,0.12);
  padding:3px 10px; border-radius:100px; letter-spacing:.08em;
  border:1px solid rgba(79,124,255,0.2);
}
.month-stats { display:flex; gap:24px; }
.mstat { text-align:right; }
.mstat-val { font-size:22px; font-weight:700; color:var(--text); line-height:1; }
.mstat-lbl { font-size:9px; color:var(--text2); text-transform:uppercase; letter-spacing:.15em; margin-top:3px; }

/* Calendar table */
.cal-wrap { overflow:hidden; border-radius:var(--radius); border:1px solid var(--border); }
.cal-table { width:100%; border-collapse:collapse; }
.cal-table thead tr {
  background:linear-gradient(to bottom, rgba(79,124,255,0.08), rgba(79,124,255,0.03));
}
.cal-table th {
  padding:12px 8px; font-size:10px; font-weight:700;
  letter-spacing:.2em; text-transform:uppercase; text-align:center;
  color:var(--text2); border-bottom:1px solid var(--border);
}
.cal-table th.h-sat { color:var(--sat); }
.cal-table th.h-sun { color:var(--sun); }

/* Cells */
.cal-cell {
  background:var(--card);
  vertical-align:top;
  padding:10px 10px 30px;
  min-height:115px;
  border:1px solid var(--border);
  transition:background .2s, border-color .2s, transform .15s, box-shadow .2s;
  position:relative;
  cursor:pointer;
}
.cal-cell:hover {
  background:var(--card2);
  border-color:var(--border3);
  z-index:2;
  box-shadow:0 8px 32px rgba(0,0,0,0.4), 0 0 0 1px rgba(79,124,255,0.15);
}
.cal-cell.empty { background:transparent; border-color:transparent; cursor:default; pointer-events:none; }
.cal-cell.is-sun .day-num { color:var(--sun); }
.cal-cell.is-sat .day-num { color:var(--sat); }
.cal-cell.has-hol { background:var(--hol-bg); }
.cal-cell.has-hol:hover { background:rgba(255,80,80,0.13); }

/* Day number */
.day-num {
  font-size:15px; font-weight:700; color:var(--text);
  display:block; margin-bottom:5px; line-height:1;
}

/* Holiday */
.hol-pill {
  display:inline-flex; align-items:center; gap:5px;
  font-size:9px; font-weight:700;
  color:var(--hol-text); background:rgba(255,80,80,0.14);
  padding:2px 8px 2px 6px; border-radius:4px;
  border:1px solid rgba(255,80,80,0.2);
  margin-bottom:5px; letter-spacing:.04em;
  animation:fadeIn .3s ease;
}
.hol-del {
  cursor:pointer; opacity:.5; font-size:10px; line-height:1;
  transition:opacity .15s, transform .15s;
}
.hol-del:hover { opacity:1; transform:scale(1.3); }

/* Event chips */
.events-list { display:flex; flex-direction:column; gap:3px; }
.ev-chip {
  display:flex; align-items:center; gap:4px;
  font-size:10px; font-weight:700;
  padding:3px 6px 3px 8px; border-radius:5px;
  letter-spacing:.04em; cursor:default;
  animation:chipIn .25s cubic-bezier(.34,1.56,.64,1) both;
  position:relative;
}
@keyframes chipIn {
  from{opacity:0;transform:scale(0.7) translateX(-8px);}
  to{opacity:1;transform:scale(1) translateX(0);}
}
.ev-dot { width:5px;height:5px;border-radius:50%;flex-shrink:0; }
.ev-label { flex:1; }
.ev-del {
  width:16px;height:16px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:10px; cursor:pointer;
  background:rgba(255,255,255,0.08);
  opacity:0; transition:opacity .15s, transform .15s, background .15s;
  border:none; color:inherit; font-family:inherit;
  margin-left:auto; flex-shrink:0;
}
.ev-chip:hover .ev-del { opacity:1; }
.ev-del:hover { background:rgba(255,80,80,0.4); transform:scale(1.2); opacity:1 !important; }

/* Colors */
.ec-nafas { background:rgba(16,185,129,.15); color:#34d399; border:1px solid rgba(16,185,129,.2); }
.ec-nafas .ev-dot { background:#34d399; }
.ec-einv  { background:rgba(139,92,246,.15); color:#a78bfa; border:1px solid rgba(139,92,246,.2); }
.ec-einv .ev-dot { background:#a78bfa; }
.ec-pert  { background:rgba(245,158,11,.15); color:#fbbf24; border:1px solid rgba(245,158,11,.2); }
.ec-pert .ev-dot { background:#fbbf24; }
.ec-hrd   { background:rgba(59,130,246,.15); color:#60a5fa; border:1px solid rgba(59,130,246,.2); }
.ec-hrd .ev-dot { background:#60a5fa; }
.ec-pink  { background:rgba(236,72,153,.15); color:#f472b6; border:1px solid rgba(236,72,153,.2); }
.ec-pink .ev-dot { background:#f472b6; }
.ec-teal  { background:rgba(20,184,166,.15); color:#2dd4bf; border:1px solid rgba(20,184,166,.2); }
.ec-teal .ev-dot { background:#2dd4bf; }
.ec-red   { background:rgba(239,68,68,.15); color:#f87171; border:1px solid rgba(239,68,68,.2); }
.ec-red .ev-dot { background:#f87171; }
.ec-gray  { background:rgba(100,116,139,.15); color:#94a3b8; border:1px solid rgba(100,116,139,.2); }
.ec-gray .ev-dot { background:#94a3b8; }

/* Add btn on cell */
.add-btn {
  position:absolute; bottom:7px; right:7px;
  width:22px; height:22px; border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff; font-size:16px; line-height:22px; text-align:center;
  cursor:pointer; border:none; font-weight:400;
  opacity:0; transform:scale(0.7);
  transition:opacity .2s, transform .2s, box-shadow .2s;
  box-shadow:0 2px 12px rgba(79,124,255,.4);
}
.cal-cell:hover .add-btn { opacity:1; transform:scale(1); }
.add-btn:hover { box-shadow:0 4px 20px rgba(79,124,255,.7); transform:scale(1.15) !important; }

/* ─── MODAL ───────────────────────────────────────────────────────── */
.modal-overlay {
  position:fixed; inset:0; z-index:500;
  background:rgba(0,0,0,0);
  backdrop-filter:blur(0px);
  display:flex; align-items:center; justify-content:center;
  pointer-events:none;
  transition:background .25s, backdrop-filter .25s;
}
.modal-overlay.open {
  background:rgba(0,0,0,0.65);
  backdrop-filter:blur(8px);
  pointer-events:all;
}
.modal {
  background:linear-gradient(145deg, #141f38 0%, #0d1828 100%);
  border:1px solid var(--border3);
  border-radius:20px; padding:36px;
  width:440px; max-width:95vw;
  transform:scale(0.85) translateY(30px);
  opacity:0;
  transition:transform .35s cubic-bezier(.34,1.56,.64,1), opacity .25s;
  box-shadow:0 40px 100px rgba(0,0,0,0.6), 0 0 0 1px rgba(79,124,255,.08), inset 0 1px 0 rgba(255,255,255,.05);
  position:relative; overflow:hidden;
}
.modal::before {
  content:''; position:absolute; top:0; left:0; right:0; height:1px;
  background:linear-gradient(90deg, transparent, rgba(79,124,255,.5), transparent);
}
.modal-overlay.open .modal { transform:scale(1) translateY(0); opacity:1; }

.modal-glow {
  position:absolute; width:200px; height:200px;
  background:radial-gradient(circle,rgba(79,124,255,.15),transparent 70%);
  top:-60px; right:-60px; pointer-events:none;
}

.modal-title {
  font-family:'Cormorant Garamond',serif;
  font-size:22px; font-weight:700; color:var(--text); margin-bottom:4px;
}
.modal-date { font-size:12px; color:var(--accent2); margin-bottom:28px; letter-spacing:.04em; }

.fg { margin-bottom:18px; }
.flabel {
  display:block; font-size:10px; font-weight:700;
  color:var(--text2); text-transform:uppercase; letter-spacing:.15em; margin-bottom:8px;
}
.finput {
  width:100%; padding:11px 14px;
  background:rgba(255,255,255,.04); border:1px solid var(--border2);
  border-radius:var(--radius-sm); color:var(--text);
  font-family:'Manrope',sans-serif; font-size:13px;
  outline:none; transition:border-color .2s, box-shadow .2s;
}
.finput:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(79,124,255,.15);
}
.finput::placeholder { color:var(--text3); }

/* Color picker */
.color-grid { display:flex; gap:8px; flex-wrap:wrap; }
.col-opt {
  width:32px; height:32px; border-radius:50%; cursor:pointer;
  border:2px solid transparent; transition:all .2s;
  display:flex; align-items:center; justify-content:center;
  font-size:13px; color:transparent;
  position:relative;
}
.col-opt::after {
  content:''; position:absolute; inset:-4px; border-radius:50%;
  border:2px solid transparent; transition:border-color .2s;
}
.col-opt.sel { color:#fff !important; transform:scale(1.15); }
.col-opt.sel::after { border-color:rgba(255,255,255,0.5); }
.col-opt:hover { transform:scale(1.1); }

.co-nafas { background:#34d399; }
.co-einv  { background:#a78bfa; }
.co-pert  { background:#fbbf24; }
.co-hrd   { background:#60a5fa; }
.co-pink  { background:#f472b6; }
.co-teal  { background:#2dd4bf; }
.co-red   { background:#f87171; }
.co-gray  { background:#94a3b8; }

.modal-footer { display:flex; gap:10px; justify-content:flex-end; margin-top:28px; }

/* Manage Events Panel (inside modal) */
.manage-panel {
  background:rgba(255,255,255,.03); border:1px solid var(--border);
  border-radius:var(--radius-sm); padding:12px;
  margin-bottom:18px; max-height:160px; overflow-y:auto;
}
.manage-panel:empty::after {
  content:'No events on this date'; color:var(--text3); font-size:12px;
  display:block; text-align:center; padding:8px 0;
}
.manage-panel::-webkit-scrollbar{width:3px;}
.manage-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.mev-row {
  display:flex; align-items:center; gap:8px;
  padding:6px 8px; border-radius:6px;
  transition:background .15s;
  animation:chipIn .2s ease both;
}
.mev-row:hover { background:rgba(255,255,255,.04); }
.mev-dot2 { width:8px;height:8px;border-radius:50%;flex-shrink:0; }
.mev-name { flex:1; font-size:12px; color:var(--text); }
.mev-del {
  padding:3px 8px; border-radius:5px;
  background:rgba(255,70,70,.12); color:#ff7070;
  border:1px solid rgba(255,70,70,.2);
  font-size:10px; font-weight:700; cursor:pointer;
  font-family:'Manrope',sans-serif; letter-spacing:.05em;
  transition:all .15s;
}
.mev-del:hover { background:rgba(255,70,70,.25); transform:scale(1.05); }

/* Tabs inside modal */
.modal-tabs { display:flex; gap:0; margin-bottom:24px; border-radius:8px; overflow:hidden; border:1px solid var(--border2); }
.mtab {
  flex:1; padding:9px; text-align:center;
  font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
  cursor:pointer; transition:all .2s; color:var(--text2);
  background:transparent; border:none; font-family:'Manrope',sans-serif;
}
.mtab.active { background:var(--accent); color:#fff; }
.mtab:not(.active):hover { background:var(--bg3); color:var(--text); }
.tab-pane { display:none; }
.tab-pane.active { display:block; animation:fadeIn .2s ease; }
@keyframes fadeIn { from{opacity:0;} to{opacity:1;} }

/* ─── TOAST ───────────────────────────────────────────────────────── */
.toast {
  position:fixed; bottom:32px; right:32px; z-index:9999;
  background:var(--card2); border:1px solid var(--border3);
  border-radius:10px; padding:13px 20px;
  display:flex; align-items:center; gap:10px;
  font-size:13px; color:var(--text);
  transform:translateY(80px) scale(0.9); opacity:0;
  transition:all .35s cubic-bezier(.34,1.56,.64,1);
  box-shadow:0 20px 50px rgba(0,0,0,.5);
  max-width:300px;
}
.toast.show { transform:translateY(0) scale(1); opacity:1; }
.t-icon { font-size:18px; flex-shrink:0; }
.t-msg { flex:1; }

/* ─── SCROLLBAR ───────────────────────────────────────────────────── */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

/* Particle burst on delete */
@keyframes burst {
  0%{transform:scale(1);opacity:1;}
  100%{transform:scale(0);opacity:0;}
}
.removing { animation:burst .2s ease forwards; }
</style>
</head>
<body>

<!-- Animated background -->
<div class="bg-canvas">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="orb orb3"></div>
  <div class="orb orb4"></div>
</div>
<div class="grid-overlay"></div>
<div class="stars" id="stars"></div>

<!-- Header -->
<header class="header">
  <div class="logo-wrap">
    <div class="logo-icon">🏢</div>
    <div>
      <div class="logo-text">KoIKMa Planner</div>
      <div class="logo-sub">2026 Schedule — May to October</div>
    </div>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="leg-dot ec-nafas"></div>NAFAS</div>
    <div class="leg-item"><div class="leg-dot ec-einv"></div>E-INV</div>
    <div class="leg-item"><div class="leg-dot ec-pert"></div>PERT</div>
    <div class="leg-item"><div class="leg-dot ec-hrd"></div>HRD</div>
    <div class="leg-item"><div class="leg-dot ec-pink"></div>Custom</div>
    <div class="leg-item"><div class="leg-dot" style="background:rgba(255,80,80,.4)"></div>Holiday</div>
  </div>

  <div class="header-right">
    <div class="unsaved-badge" id="unsavedBadge">
      <div class="pulse-ring"></div>
      UNSAVED
    </div>
    <button class="btn btn-ghost" onclick="resetAll()">↺ Reset</button>
    <button class="btn btn-primary" onclick="saveData()">💾 Save</button>
  </div>
</header>

<!-- Main -->
<div class="main" id="main"></div>

<!-- Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-glow"></div>
    <div class="modal-title" id="mTitle">Manage Day</div>
    <div class="modal-date" id="mDate"></div>

    <div class="modal-tabs">
      <button class="mtab active" onclick="switchTab('add')">＋ Add Event</button>
      <button class="mtab" onclick="switchTab('manage')">✎ Manage Events</button>
      <button class="mtab" onclick="switchTab('holiday')">🏖 Holiday</button>
    </div>

    <!-- ADD TAB -->
    <div class="tab-pane active" id="tab-add">
      <div class="fg">
        <label class="flabel">Event Name</label>
        <input class="finput" id="evtName" placeholder="e.g. Meeting, NAFAS, E-INV…" maxlength="30">
      </div>
      <div class="fg">
        <label class="flabel">Color / Category</label>
        <div class="color-grid" id="colorGrid">
          <div class="col-opt co-nafas sel" data-cls="ec-nafas" data-dot="#34d399" onclick="pickColor(this)" title="NAFAS">✓</div>
          <div class="col-opt co-einv" data-cls="ec-einv" data-dot="#a78bfa" onclick="pickColor(this)" title="E-INV">✓</div>
          <div class="col-opt co-pert" data-cls="ec-pert" data-dot="#fbbf24" onclick="pickColor(this)" title="PERT">✓</div>
          <div class="col-opt co-hrd" data-cls="ec-hrd" data-dot="#60a5fa" onclick="pickColor(this)" title="HRD">✓</div>
          <div class="col-opt co-pink" data-cls="ec-pink" data-dot="#f472b6" onclick="pickColor(this)" title="Custom Pink">✓</div>
          <div class="col-opt co-teal" data-cls="ec-teal" data-dot="#2dd4bf" onclick="pickColor(this)" title="Teal">✓</div>
          <div class="col-opt co-red" data-cls="ec-red" data-dot="#f87171" onclick="pickColor(this)" title="Red">✓</div>
          <div class="col-opt co-gray" data-cls="ec-gray" data-dot="#94a3b8" onclick="pickColor(this)" title="Gray">✓</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addEvent()">Add Event →</button>
      </div>
    </div>

    <!-- MANAGE TAB -->
    <div class="tab-pane" id="tab-manage">
      <div class="fg">
        <label class="flabel">Events on this day</label>
        <div class="manage-panel" id="managePanel"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Done</button>
      </div>
    </div>

    <!-- HOLIDAY TAB -->
    <div class="tab-pane" id="tab-holiday">
      <div class="fg">
        <label class="flabel">Holiday / Public Note</label>
        <input class="finput" id="holName" placeholder="e.g. Hari Raya Haji, Labour Day…" maxlength="50">
      </div>
      <div class="fg" id="holCurrentWrap" style="display:none">
        <label class="flabel">Current</label>
        <div id="holCurrent" style="font-size:12px;color:var(--hol-text);padding:8px;background:rgba(255,80,80,.08);border-radius:6px;display:flex;align-items:center;justify-content:space-between;">
          <span id="holCurrentText"></span>
          <button class="btn btn-danger" style="padding:4px 10px;font-size:10px;" onclick="removeHoliday()">Remove</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="setHoliday()">Set Holiday →</button>
      </div>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">
  <span class="t-icon" id="tIcon">✓</span>
  <span class="t-msg" id="tMsg">Saved!</span>
</div>

<script>
// ── Stars ──────────────────────────────────────────────────────────────────
(function() {
  const c = document.getElementById('stars');
  for (let i = 0; i < 90; i++) {
    const s = document.createElement('div');
    s.className = 'star';
    const sz = Math.random() * 2 + 0.5;
    s.style.cssText = `
      width:${sz}px;height:${sz}px;
      top:${Math.random()*100}%;left:${Math.random()*100}%;
      animation-duration:${2+Math.random()*4}s;
      animation-delay:${Math.random()*4}s;
    `;
    c.appendChild(s);
  }
})();

// ── Data ───────────────────────────────────────────────────────────────────
const MONTHS = [
  {name:'May',      num:5,  year:2026,days:31,start:4},
  {name:'June',     num:6,  year:2026,days:30,start:0},
  {name:'July',     num:7,  year:2026,days:31,start:2},
  {name:'August',   num:8,  year:2026,days:31,start:5},
  {name:'September',num:9,  year:2026,days:30,start:1},
  {name:'October',  num:10, year:2026,days:31,start:3},
];

const DOT_MAP = {
  'ec-nafas':'#34d399','ec-einv':'#a78bfa','ec-pert':'#fbbf24',
  'ec-hrd':'#60a5fa','ec-pink':'#f472b6','ec-teal':'#2dd4bf',
  'ec-red':'#f87171','ec-gray':'#94a3b8'
};

const DEFAULTS = {
  "2026-05-01":{h:"Labour Day",e:[]},"2026-05-06":{h:"",e:[{n:"E-INV",c:"ec-einv"}]},
  "2026-05-07":{h:"",e:[{n:"E-INV",c:"ec-einv"}]},"2026-05-11":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-05-12":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-05-13":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-05-18":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-05-19":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-05-20":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-05-23":{h:"",e:[{n:"PERT",c:"ec-pert"}]},
  "2026-05-27":{h:"Hari Raya Haji",e:[]},"2026-06-01":{h:"Agong Birthday",e:[]},
  "2026-06-02":{h:"",e:[{n:"HRD",c:"ec-hrd"}]},"2026-06-03":{h:"",e:[{n:"HRD",c:"ec-hrd"}]},
  "2026-06-04":{h:"",e:[{n:"HRD",c:"ec-hrd"}]},"2026-06-08":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-06-09":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-06-10":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-06-29":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-06-30":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-07-01":{h:"",e:[{n:"E-INV",c:"ec-einv"}]},"2026-07-02":{h:"",e:[{n:"E-INV",c:"ec-einv"}]},
  "2026-07-04":{h:"",e:[{n:"PERT",c:"ec-pert"}]},"2026-07-13":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-07-14":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-07-15":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-07-27":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-07-28":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-07-29":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-08-03":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-08-04":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-08-05":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-08-08":{h:"",e:[{n:"PERT",c:"ec-pert"}]},"2026-08-17":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-08-18":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-08-19":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-08-31":{h:"Merdeka",e:[]},"2026-09-07":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-09-08":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-09-09":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-09-12":{h:"",e:[{n:"PERT",c:"ec-pert"}]},"2026-09-16":{h:"Malaysia Day",e:[]},
  "2026-09-21":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-09-22":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-09-23":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-09-26":{h:"",e:[{n:"PERT",c:"ec-pert"}]},
  "2026-10-05":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-10-06":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-10-07":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-10-19":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
  "2026-10-20":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},"2026-10-21":{h:"",e:[{n:"NAFAS",c:"ec-nafas"}]},
};

let cal = loadData();
let activeKey = null;
let selColor = 'ec-nafas';
let selDot = '#34d399';
let activeTab = 'add';
let dirty = false;

function loadData() {
  try { const s=localStorage.getItem('koikma_2026'); return s?JSON.parse(s):JSON.parse(JSON.stringify(DEFAULTS)); }
  catch(e){return JSON.parse(JSON.stringify(DEFAULTS));}
}

function saveData() {
  localStorage.setItem('koikma_2026', JSON.stringify(cal));
  dirty = false;
  document.getElementById('unsavedBadge').classList.remove('show');
  showToast('💾','Calendar saved!');
}

function resetAll() {
  if (!confirm('Reset all data to default?')) return;
  cal = JSON.parse(JSON.stringify(DEFAULTS));
  localStorage.removeItem('koikma_2026');
  dirty = false;
  document.getElementById('unsavedBadge').classList.remove('show');
  renderAll();
  showToast('↺','Reset to default');
}

function markDirty() {
  dirty = true;
  document.getElementById('unsavedBadge').classList.add('show');
}

// ── Render ─────────────────────────────────────────────────────────────────
function key(year, num, day) {
  return `${year}-${String(num).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
}

function renderAll() {
  const main = document.getElementById('main');
  main.innerHTML = '';
  MONTHS.forEach((m, mi) => {
    let evCount=0, holCount=0;
    for(let d=1;d<=m.days;d++){
      const k=key(m.year,m.num,d), c=cal[k];
      if(c){if(c.e&&c.e.length)evCount+=c.e.length; if(c.h)holCount++;}
    }
    const sec = document.createElement('div');
    sec.className = 'month-section';
    sec.style.animationDelay = (mi*0.1)+'s';
    sec.innerHTML = `
      <div class="month-header">
        <div class="month-name">${m.name}<span class="month-tag">${m.year}</span></div>
        <div class="month-stats">
          <div class="mstat"><div class="mstat-val">${evCount}</div><div class="mstat-lbl">Events</div></div>
          <div class="mstat"><div class="mstat-val">${holCount}</div><div class="mstat-lbl">Holidays</div></div>
        </div>
      </div>
      <div class="cal-wrap">
        <table class="cal-table">
          <thead><tr>
            <th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th>
            <th class="h-sat">SAT</th><th class="h-sun">SUN</th>
          </tr></thead>
          <tbody id="tb-${mi}"></tbody>
        </table>
      </div>
    `;
    main.appendChild(sec);

    const tbody = sec.querySelector(`#tb-${mi}`);
    let cells=[];
    for(let i=0;i<m.start;i++) cells.push(null);
    for(let d=1;d<=m.days;d++) cells.push(d);
    while(cells.length%7!==0) cells.push(null);

    for(let r=0;r<cells.length/7;r++){
      const tr=document.createElement('tr');
      for(let c=0;c<7;c++){
        const day=cells[r*7+c];
        const td=document.createElement('td');
        if(!day){
          td.className='cal-cell empty';
        } else {
          const dow=c;
          const k=key(m.year,m.num,day);
          const data=cal[k]||{h:'',e:[]};
          const isSun=dow===6, isSat=dow===5, hasHol=!!data.h;
          td.className='cal-cell'+(isSun?' is-sun':'')+(isSat?' is-sat':'')+(hasHol?' has-hol':'');

          const chips=(data.e||[]).map((ev,ei)=>`
            <div class="ev-chip ${ev.c}" style="animation-delay:${ei*0.05}s">
              <div class="ev-dot" style="background:${DOT_MAP[ev.c]||'#94a3b8'}"></div>
              <span class="ev-label">${ev.n}</span>
              <button class="ev-del" onclick="quickDel(event,'${k}',${ei})" title="Remove">✕</button>
            </div>
          `).join('');

          td.innerHTML = `
            <span class="day-num">${day}</span>
            ${hasHol?`<div class="hol-pill">🏖 ${data.h}<span class="hol-del" onclick="quickDelHol(event,'${k}')">✕</span></div>`:''}
            <div class="events-list">${chips}</div>
            <button class="add-btn" onclick="openModal(event,'${k}','${m.name} ${day}, ${m.year}')">+</button>
          `;
          td.addEventListener('click', () => openModal(null, k, `${m.name} ${day}, ${m.year}`));
        }
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
  });
}

// ── Quick actions (on cell, no modal) ─────────────────────────────────────
function quickDel(e, k, idx) {
  e.stopPropagation();
  const chip = e.target.closest('.ev-chip');
  if(chip){ chip.classList.add('removing'); setTimeout(()=>{ doDelEvent(k,idx); },180); }
  else doDelEvent(k,idx);
}
function doDelEvent(k, idx) {
  if(!cal[k]) return;
  const name = cal[k].e[idx]?.n || 'Event';
  cal[k].e.splice(idx,1);
  markDirty(); renderAll();
  showToast('🗑','Removed: '+name);
}
function quickDelHol(e, k) {
  e.stopPropagation();
  if(!cal[k]) return;
  const name = cal[k].h;
  cal[k].h = '';
  markDirty(); renderAll();
  showToast('🗑','Removed holiday: '+name);
}

// ── Modal ──────────────────────────────────────────────────────────────────
function openModal(e, k, label) {
  if(e) e.stopPropagation();
  activeKey = k;
  document.getElementById('mDate').textContent = label;
  document.getElementById('evtName').value = '';
  document.getElementById('holName').value = '';
  selColor='ec-nafas'; selDot='#34d399';
  document.querySelectorAll('.col-opt').forEach(o=>{
    o.classList.toggle('sel', o.dataset.cls===selColor);
  });
  switchTab('add');
  document.getElementById('modal').classList.add('open');
  setTimeout(()=>document.getElementById('evtName').focus(),350);
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

function switchTab(t) {
  activeTab = t;
  document.querySelectorAll('.mtab').forEach((b,i)=>{
    b.classList.toggle('active', ['add','manage','holiday'][i]===t);
  });
  document.querySelectorAll('.tab-pane').forEach((p,i)=>{
    p.classList.toggle('active', ['tab-add','tab-manage','tab-holiday'][i]==='tab-'+t);
  });
  if(t==='manage') renderManagePanel();
  if(t==='holiday') renderHolidayTab();
}

function renderManagePanel() {
  const panel = document.getElementById('managePanel');
  const data = cal[activeKey]||{h:'',e:[]};
  if(!data.e||!data.e.length){ panel.innerHTML=''; return; }
  panel.innerHTML = data.e.map((ev,i)=>`
    <div class="mev-row" id="mev-${i}">
      <div class="mev-dot2" style="background:${DOT_MAP[ev.c]||'#94a3b8'}"></div>
      <span class="mev-name">${ev.n}</span>
      <button class="mev-del" onclick="delFromPanel(${i})">✕ Remove</button>
    </div>
  `).join('');
}

function renderHolidayTab() {
  const data = cal[activeKey]||{h:'',e:[]};
  const wrap = document.getElementById('holCurrentWrap');
  if(data.h){
    wrap.style.display='block';
    document.getElementById('holCurrentText').textContent = data.h;
  } else {
    wrap.style.display='none';
  }
}

function delFromPanel(idx) {
  const row = document.getElementById('mev-'+idx);
  if(row){ row.classList.add('removing'); setTimeout(()=>{ doDelEvent(activeKey,idx); renderManagePanel(); },180); }
}

function pickColor(el) {
  selColor=el.dataset.cls; selDot=el.dataset.dot;
  document.querySelectorAll('.col-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
}

function addEvent() {
  const n=document.getElementById('evtName').value.trim();
  if(!n){ showToast('⚠','Enter an event name'); return; }
  if(!cal[activeKey]) cal[activeKey]={h:'',e:[]};
  cal[activeKey].e.push({n,c:selColor});
  markDirty(); closeModal(); renderAll();
  showToast('✓','Added: '+n);
}

function setHoliday() {
  const h=document.getElementById('holName').value.trim();
  if(!h){ showToast('⚠','Enter a holiday name'); return; }
  if(!cal[activeKey]) cal[activeKey]={h:'',e:[]};
  cal[activeKey].h=h;
  markDirty(); closeModal(); renderAll();
  showToast('🏖','Holiday set: '+h);
}

function removeHoliday() {
  if(!cal[activeKey]) return;
  const name=cal[activeKey].h;
  cal[activeKey].h='';
  markDirty(); closeModal(); renderAll();
  showToast('🗑','Removed: '+name);
}

// ── Toast ──────────────────────────────────────────────────────────────────
let toastT;
function showToast(icon,msg){
  clearTimeout(toastT);
  document.getElementById('tIcon').textContent=icon;
  document.getElementById('tMsg').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('show');
  toastT=setTimeout(()=>t.classList.remove('show'),2800);
}

// ── Keyboard ───────────────────────────────────────────────────────────────
document.addEventListener('keydown',e=>{
  if(e.key==='Escape') closeModal();
  if(e.key==='Enter'&&document.getElementById('modal').classList.contains('open')){
    if(activeTab==='add') addEvent();
    else if(activeTab==='holiday') setHoliday();
  }
});
document.getElementById('modal').addEventListener('click',function(e){
  if(e.target===this) closeModal();
});

// ── Init ───────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
