<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MangaVault Pro</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#0f0f14;
  color:white;
}

header {
  padding:15px;
  background:#1a1a22;
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  outline:none;
}

button {
  padding:10px 14px;
  border:none;
  background:#e63946;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#1a1a22;
  padding:12px;
  border-radius:10px;
  cursor:pointer;
  transition:0.2s;
}

.card:hover {
  transform:scale(1.03);
  background:#222230;
}

.title {
  font-size:14px;
  font-weight:bold;
}

.small {
  font-size:12px;
  color:#aaa;
  margin-top:5px;
}

.loader {
  padding:20px;
  text-align:center;
  color:#aaa;
}
</style>
</head>

<body>

<header>
  <input id="search" placeholder="Search manga...">
  <button onclick="searchManga()">Search</button>
</header>

<div id="output" class="grid"></div>

<script>

const API = "https://manga-app-fjwl.onrender.com";

async function searchManga() {
  const q = document.getElementById("search").value;
  const output = document.getElementById("output");

  output.innerHTML = `<div class="loader">Loading...</div>`;

  try {
    const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();

    if (!data || !data.data) {
      output.innerHTML = `<div class="loader">No results found</div>`;
      return;
    }

    output.innerHTML = "";

    data.data.forEach(item => {

      const title =
        item.attributes?.title?.en ||
        Object.values(item.attributes?.title || {})[0] ||
        "Unknown Title";

      const card = document.createElement("div");
      card.className = "card";

      card.innerHTML = `
        <div class="title">${title}</div>
        <div class="small">Tap to open</div>
      `;

      // ✅ CLICK WORKING NOW
      card.addEventListener("click", () => {
        openManga(item.id);
      });

      output.appendChild(card);
    });

  } catch (err) {
    output.innerHTML = `<div class="loader">API error / connection failed</div>`;
  }
}

// ✅ OPEN MANGA
function openManga(id) {
  window.open(`https://mangadex.org/title/${id}`, "_blank");
}

</script>

</body>
</html>
