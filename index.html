<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Reader Fixed</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f14;
  color:white;
}

header {
  padding:10px;
  display:flex;
  gap:10px;
  background:#1a1a22;
}

input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#e63946;
  color:white;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#1a1a22;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.card:active { transform:scale(0.98); }

#reader {
  position:fixed;
  inset:0;
  background:black;
  display:none;
  flex-direction:column;
}

#top {
  padding:10px;
  background:#111;
  display:flex;
  justify-content:space-between;
}

#img {
  flex:1;
  display:flex;
  align-items:center;
  justify-content:center;
}

#img img {
  max-width:100%;
  max-height:100%;
}

.controls {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}

#debug {
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#222;
  font-size:12px;
  padding:5px;
  color:#00ff88;
}
</style>
</head>

<body>

<header>
  <input id="q" placeholder="Search manga">
  <button onclick="search()">Search</button>
</header>

<div id="list" class="grid"></div>

<!-- READER -->
<div id="reader">
  <div id="top">
    <div id="title">Reader</div>
    <button onclick="closeR()">X</button>
  </div>

  <div id="img">
    <img id="page">
  </div>

  <div class="controls">
    <button onclick="prev()">Prev</button>
    <button onclick="next()">Next</button>
  </div>
</div>

<div id="debug">Ready</div>

<script>

const API = "https://manga-app-fjwl.onrender.com";

let pages = [];
let i = 0;

// ---------------- DEBUG ----------------
function log(msg){
  console.log(msg);
  document.getElementById("debug").innerText = msg;
}

// ---------------- SEARCH ----------------
async function search(){

  const q = document.getElementById("q").value;
  const list = document.getElementById("list");

  log("Searching: " + q);
  list.innerHTML = "Loading...";

  try {
    const res = await fetch(`${API}/search?q=${q}`);
    const data = await res.json();

    list.innerHTML = "";

    data.data.forEach(m => {

      const title =
        m.attributes?.title?.en ||
        Object.values(m.attributes?.title || {})[0] ||
        "Unknown";

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `<b>${title}</b>`;

      // CLICK TEST
      div.onclick = () => {
        console.log("CLICKED:", title);
        openManga(m.id, title);
      };

      list.appendChild(div);
    });

    log("Search done");

  } catch (e) {
    console.log(e);
    log("Search failed");
  }
}

// ---------------- OPEN MANGA (FIXED) ----------------
async function openManga(id, title){

  log("Loading chapters...");

  try {

    // STEP 1: GET CHAPTER LIST
    const res = await fetch(
      `https://api.mangadex.org/manga/${id}/feed?limit=1&translatedLanguage[]=en`
    );

    const feed = await res.json();
    console.log("feed:", feed);

    if (!feed.data || feed.data.length === 0) {
      alert("No chapters found");
      log("No chapters");
      return;
    }

    const chapterId = feed.data[0].id;

    log("Loading pages...");

    // STEP 2: GET CHAPTER IMAGES
    const res2 = await fetch(
      `https://api.mangadex.org/at-home/server/${chapterId}`
    );

    const ch = await res2.json();
    console.log("chapter:", ch);

    if (!ch.chapter) {
      alert("Failed to load pages");
      log("No chapter data");
      return;
    }

    const base = ch.baseUrl;
    const hash = ch.chapter.hash;

    pages = ch.chapter.data.map(p =>
      `${base}/data/${hash}/${p}`
    );

    i = 0;

    document.getElementById("reader").style.display = "flex";
    document.getElementById("title").innerText = title;

    show();

    log("Reader opened");

  } catch (e) {
    console.log(e);
    log("ERROR loading manga");
  }
}

// ---------------- READER ----------------
function show(){
  document.getElementById("page").src = pages[i];
}

function next(){
  if(i < pages.length-1){
    i++;
    show();
  }
}

function prev(){
  if(i > 0){
    i--;
    show();
  }
}

function closeR(){
  document.getElementById("reader").style.display = "none";
}

</script>

</body>
</html>
