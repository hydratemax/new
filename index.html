<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Reader Pro</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f14;
  color:white;
}

header {
  display:flex;
  gap:10px;
  padding:10px;
  background:#1a1a22;
}

input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

button {
  padding:10px;
  border:none;
  border-radius:8px;
  background:#e63946;
  color:white;
}

/* SEARCH */
.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#1a1a22;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

/* CHAPTER LIST */
#chapters {
  position:fixed;
  right:0;
  top:0;
  bottom:0;
  width:40%;
  background:#111;
  overflow:auto;
  display:none;
  padding:10px;
}

.chapter {
  padding:10px;
  margin-bottom:5px;
  background:#222;
  border-radius:8px;
  cursor:pointer;
}

/* READER */
#reader {
  position:fixed;
  inset:0;
  background:black;
  overflow-y:scroll;
  display:none;
}

.page {
  width:100%;
  display:block;
}

/* CLOSE */
.topbar {
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#111;
  padding:10px;
  display:flex;
  justify-content:space-between;
  z-index:10;
}
</style>
</head>

<body>

<header>
  <input id="q" placeholder="Search manga">
  <button onclick="search()">Search</button>
</header>

<div id="list" class="grid"></div>

<!-- CHAPTER PANEL -->
<div id="chapters"></div>

<!-- READER -->
<div id="reader">
  <div class="topbar">
    <button onclick="closeReader()">Close</button>
    <span id="title"></span>
  </div>
  <div id="pages"></div>
</div>

<script>

const API = "https://manga-app-fjwl.onrender.com";

let currentMangaId = "";
let currentTitle = "";

/* SEARCH */
async function search(){

  const q = document.getElementById("q").value;
  const list = document.getElementById("list");

  list.innerHTML = "Loading...";

  const res = await fetch(`${API}/search?q=${q}`);
  const data = await res.json();

  list.innerHTML = "";

  data.data.forEach(m => {

    const title =
      m.attributes?.title?.en ||
      Object.values(m.attributes?.title || {})[0] ||
      "Unknown";

    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<b>${title}</b>`;

    div.onclick = () => openManga(m.id, title);

    list.appendChild(div);
  });
}

/* OPEN MANGA → LOAD CHAPTERS */
async function openManga(id, title){

  currentMangaId = id;
  currentTitle = title;

  const panel = document.getElementById("chapters");
  panel.style.display = "block";
  panel.innerHTML = "Loading chapters...";

  const res = await fetch(`${API}/chapters?id=${id}`);
  const data = await res.json();

  panel.innerHTML = "";

  data.chapters.forEach(c => {

    const div = document.createElement("div");
    div.className = "chapter";

    div.innerText = `Chapter ${c.chapter}`;

    div.onclick = () => loadChapter(c.id, c.chapter);

    panel.appendChild(div);
  });
}

/* LOAD CHAPTER → SCROLL MODE */
async function loadChapter(chapterId, chapterNo){

  document.getElementById("chapters").style.display = "none";

  const reader = document.getElementById("reader");
  const pagesDiv = document.getElementById("pages");

  pagesDiv.innerHTML = "Loading...";

  const res = await fetch(`${API}/pages?id=${chapterId}`);
  const ch = await res.json();

  const base = ch.baseUrl;
  const hash = ch.hash;

  const useData = ch.data.length > 0;
  const list = useData ? ch.data : ch.dataSaver;
  const folder = useData ? "data" : "data-saver";

  pagesDiv.innerHTML = "";

  list.forEach(p => {

    const img = document.createElement("img");
    img.className = "page";
    img.src = `${base}/${folder}/${hash}/${p}`;

    pagesDiv.appendChild(img);
  });

  reader.style.display = "block";
  document.getElementById("title").innerText =
    `${currentTitle} - Ch ${chapterNo}`;
}

/* CLOSE */
function closeReader(){
  document.getElementById("reader").style.display = "none";
}

</script>

</body>
</html>
