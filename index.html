<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga App FINAL FIX</title>

<style>
body { margin:0; font-family:Arial; background:#0f0f14; color:white; }
header { display:flex; gap:10px; padding:10px; background:#1a1a22; }
input { flex:1; padding:10px; border:none; border-radius:8px; }
button { padding:10px; border:none; border-radius:8px; background:#e63946; color:white; }
.grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; padding:10px; }
.card { background:#1a1a22; padding:10px; border-radius:10px; cursor:pointer; }
#reader { position:fixed; inset:0; background:black; display:none; flex-direction:column; }
#img { flex:1; display:flex; align-items:center; justify-content:center; }
#img img { max-width:100%; max-height:100%; }
.controls { display:flex; justify-content:space-between; padding:10px; background:#111; }
#debug { position:fixed; bottom:0; left:0; right:0; background:#222; font-size:12px; padding:5px; color:#00ff88; }
</style>
</head>

<body>

<header>
  <input id="q" placeholder="Search manga">
  <button onclick="search()">Search</button>
</header>

<div id="list" class="grid"></div>

<div id="reader">
  <div style="padding:10px;background:#111;">
    <button onclick="closeR()">Close</button>
  </div>

  <div id="img">
    <img id="page">
  </div>

  <div class="controls">
    <button onclick="prev()">Prev</button>
    <button onclick="next()">Next</button>
  </div>
</div>

<div id="debug">Ready</div>

<script>

const API = "https://manga-app-fjwl.onrender.com";

let pages = [];
let i = 0;

function log(m){
  console.log(m);
  document.getElementById("debug").innerText = m;
}

/* SEARCH */
async function search(){

  const q = document.getElementById("q").value;
  const list = document.getElementById("list");

  list.innerHTML = "Loading...";
  log("Searching...");

  try {

    const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();

    list.innerHTML = "";

    data.data.forEach(m => {

      const title =
        m.attributes?.title?.en ||
        Object.values(m.attributes?.title || {})[0] ||
        "Unknown";

      const div = document.createElement("div");
      div.className = "card";
      div.innerHTML = `<b>${title}</b>`;
      div.onclick = () => openManga(m.id);

      list.appendChild(div);
    });

    log("Search OK");

  } catch {
    log("Search failed");
  }
}

/* OPEN */
async function openManga(id){

  log("Loading chapters...");

  try {

    const res = await fetch(`${API}/chapters?id=${id}`);
    const feed = await res.json();

    const chapter = feed.data?.find(c => c.type === "chapter");

    if(!chapter){
      log("No valid chapter");
      return;
    }

    log("Loading pages...");

    const res2 = await fetch(`${API}/pages?id=${chapter.id}`);
    const ch = await res2.json();

    if(!ch.baseUrl || !ch.hash){
      log("Invalid image data");
      return;
    }

    const useData = ch.data.length > 0;
    const list = useData ? ch.data : ch.dataSaver;
    const folder = useData ? "data" : "data-saver";

    if(!list || list.length === 0){
      log("No images found");
      return;
    }

    // 🚨 FILTER OUT UNDEFINED
    pages = list
      .filter(p => typeof p === "string")
      .map(p => `${ch.baseUrl}/${folder}/${ch.hash}/${p}`);

    if(pages.length === 0){
      log("All images invalid");
      return;
    }

    i = 0;

    document.getElementById("reader").style.display = "flex";

    show();

    log("Reader ready");

  } catch (e) {
    console.log(e);
    log("ERROR loading manga");
  }
}

/* READER */
function show(){
  const img = document.getElementById("page");

  img.onerror = () => {
    log("FAILED URL: " + pages[i]);
  };

  img.src = pages[i];
}

function next(){
  if(i < pages.length-1){
    i++;
    show();
  }
}

function prev(){
  if(i > 0){
    i--;
    show();
  }
}

function closeR(){
  document.getElementById("reader").style.display = "none";
}

</script>

</body>
</html>
