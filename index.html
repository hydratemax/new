<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manga Reader</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0f;
  color: white;
}

/* TOP BAR */
.topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: #111;
  display: flex;
  gap: 10px;
  padding: 10px;
  z-index: 10;
}

input {
  flex: 1;
  padding: 10px;
  border-radius: 20px;
  border: none;
  outline: none;
}

button {
  padding: 10px 14px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

/* STATUS */
#status {
  margin-top: 70px;
  text-align: center;
  color: gray;
  font-size: 14px;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  padding: 10px;
}

.card {
  background: #1a1a22;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card p {
  font-size: 12px;
  padding: 6px;
}

/* READER */
.reader {
  position: fixed;
  inset: 0;
  background: black;
  display: none;
  overflow-y: auto;
  z-index: 50;
}

.reader.open {
  display: block;
}

.reader img {
  width: 100%;
  max-width: 800px;
  display: block;
  margin: auto;
}

.loading {
  text-align: center;
  padding: 20px;
  color: gray;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <input id="searchInput" placeholder="Search manga..." onkeydown="if(event.key==='Enter') search()">
  <button onclick="search()">Search</button>
</div>

<div id="status">Loading trending...</div>
<div id="grid" class="grid"></div>

<div id="reader" class="reader" onclick="this.classList.remove('open')"></div>

<script>
/* ─────────────────────────────
   API (FIXED)
──────────────────────────── */
const API = "https://manga-app-fjwl.onrender.com";

/* ─────────────────────────────
   SAFE FETCH
──────────────────────────── */
async function fetchJSON(url) {
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error("HTTP " + res.status);
    return await res.json();
  } catch (e) {
    console.log("API ERROR:", url, e.message);
    return null;
  }
}

/* ─────────────────────────────
   INIT
──────────────────────────── */
loadTrending();

/* ─────────────────────────────
   TRENDING
──────────────────────────── */
async function loadTrending() {
  const data = await fetchJSON(API + "/trending");

  const grid = document.getElementById("grid");
  const status = document.getElementById("status");

  grid.innerHTML = "";

  if (!data || !data.results || data.results.length === 0) {
    status.innerText = "No trending data / server issue";
    return;
  }

  status.innerText = "";

  renderGrid(data.results);
}

/* ─────────────────────────────
   SEARCH
──────────────────────────── */
async function search() {
  const q = document.getElementById("searchInput").value.trim();
  if (!q) return;

  const status = document.getElementById("status");
  const grid = document.getElementById("grid");

  status.innerText = "Searching...";
  grid.innerHTML = "";

  const data = await fetchJSON(API + "/search?q=" + encodeURIComponent(q));

  if (!data || !data.results) {
    status.innerText = "Search failed (backend issue)";
    return;
  }

  if (data.results.length === 0) {
    status.innerText = "No results found";
    return;
  }

  status.innerText = "";
  renderGrid(data.results);
}

/* ─────────────────────────────
   RENDER GRID
──────────────────────────── */
function renderGrid(items) {
  const grid = document.getElementById("grid");

  grid.innerHTML = "";

  items.forEach(m => {
    const card = document.createElement("div");
    card.className = "card";

    card.innerHTML = `
      <img src="${API}/proxy?url=${encodeURIComponent(m.cover || "")}">
      <p>${m.title}</p>
    `;

    card.onclick = () => openManga(m);
    grid.appendChild(card);
  });
}

/* ─────────────────────────────
   OPEN MANGA
──────────────────────────── */
async function openManga(m) {
  const status = document.getElementById("status");
  status.innerText = "Loading chapters...";

  const data = await fetchJSON(API + "/chapters?id=" + m.id);

  if (!data || !data.chapters) {
    status.innerText = "Failed to load chapters";
    return;
  }

  status.innerText = "";
  openReader(data.chapters);
}

/* ─────────────────────────────
   READER (simple)
──────────────────────────── */
async function openReader(chapters) {
  const reader = document.getElementById("reader");
  reader.classList.add("open");
  reader.innerHTML = "<div class='loading'>Loading chapter...</div>";

  if (!chapters.length) {
    reader.innerHTML = "<div class='loading'>No chapters found</div>";
    return;
  }

  const ch = chapters[0]; // auto first chapter

  const data = await fetchJSON(API + "/pages?id=" + ch.id);

  if (!data || !data.images) {
    reader.innerHTML = "<div class='loading'>Failed to load pages</div>";
    return;
  }

  reader.innerHTML = "";

  data.images.forEach(src => {
    const img = document.createElement("img");
    img.src = API + "/proxy?url=" + encodeURIComponent(src);
    reader.appendChild(img);
  });
}
</script>

</body>
</html>
