<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Simple Manga Reader</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0b10;
  color:white;
}

header {
  padding:12px;
  display:flex;
  gap:10px;
  background:#1a1a25;
}

input {
  flex:1;
  padding:8px;
  border:none;
  border-radius:8px;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#1e1e2d;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.card p {
  font-size:12px;
  padding:6px;
}

.reader {
  display:none;
  position:fixed;
  inset:0;
  background:black;
  overflow:auto;
}

.reader img {
  width:100%;
}

.topbar {
  position:fixed;
  top:0;
  left:0;
  right:0;
  background:#111;
  padding:10px;
  display:flex;
  justify-content:space-between;
  z-index:10;
}
</style>
</head>

<body>

<header>
  <input id="search" placeholder="Search manga...">
</header>

<div class="grid" id="grid"></div>

<div class="reader" id="reader">
  <div class="topbar">
    <button onclick="closeReader()">Back</button>
    <div id="title"></div>
  </div>
  <div id="pages"></div>
</div>

<script>
// =====================
// LOCAL DATA (NO API)
// =====================
const mangaData = [
  {
    id: 1,
    title: "Naruto Fan Arc",
    cover: "https://picsum.photos/300/400?1",
    pages: [
      "https://picsum.photos/600/900?11",
      "https://picsum.photos/600/900?12",
      "https://picsum.photos/600/900?13"
    ]
  },
  {
    id: 2,
    title: "Dragon Fight",
    cover: "https://picsum.photos/300/400?2",
    pages: [
      "https://picsum.photos/600/900?21",
      "https://picsum.photos/600/900?22",
      "https://picsum.photos/600/900?23"
    ]
  },
  {
    id: 3,
    title: "Romance Story",
    cover: "https://picsum.photos/300/400?3",
    pages: [
      "https://picsum.photos/600/900?31",
      "https://picsum.photos/600/900?32",
      "https://picsum.photos/600/900?33"
    ]
  }
];

// =====================
// RENDER LIBRARY
// =====================
const grid = document.getElementById("grid");

function render(list){
  grid.innerHTML = "";

  list.forEach(m => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${m.cover}">
      <p>${m.title}</p>
    `;

    div.onclick = () => openReader(m);

    grid.appendChild(div);
  });
}

render(mangaData);

// =====================
// SEARCH
// =====================
document.getElementById("search").addEventListener("input", e => {
  const q = e.target.value.toLowerCase();
  const filtered = mangaData.filter(m =>
    m.title.toLowerCase().includes(q)
  );
  render(filtered);
});

// =====================
// READER
// =====================
function openReader(manga){
  document.getElementById("reader").style.display = "block";
  document.getElementById("title").innerText = manga.title;

  const pages = document.getElementById("pages");
  pages.innerHTML = "";

  manga.pages.forEach(p => {
    const img = document.createElement("img");
    img.src = p;
    pages.appendChild(img);
  });

  localStorage.setItem("last_read", JSON.stringify(manga));
}

function closeReader(){
  document.getElementById("reader").style.display = "none";
}
</script>

</body>
</html>
