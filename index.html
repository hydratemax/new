<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KoIKMa Planner 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#04070f;--bg2:#07101e;--bg3:#0b1829;
  --card:#090f1d;--card2:#0d1628;--card3:#111e32;
  --border:rgba(120,160,255,0.07);--border2:rgba(120,160,255,0.13);
  --border3:rgba(120,160,255,0.22);
  --text:#e8eeff;--text2:#5a6b96;--text3:#2a3552;
  --accent:#3a6bff;--accent2:#6a96ff;--accent3:#a0bfff;
  --gold:#d4a44c;--gold2:#eec976;
  --sun:#ff5c5c;--sat:#ff8c42;
  --hol-bg:rgba(255,60,60,0.06);--hol-text:#ff8080;
  --radius:16px;--radius-sm:10px;
  --header-h:64px;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);padding-bottom:120px;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}
.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.orb{position:absolute;border-radius:50%;animation:orbDrift linear infinite;mix-blend-mode:screen;}
.orb1{width:700px;height:700px;background:radial-gradient(circle at 40% 40%,rgba(40,80,255,.18) 0%,transparent 65%);top:-150px;left:-150px;animation-duration:35s;}
.orb2{width:600px;height:600px;background:radial-gradient(circle at 60% 60%,rgba(100,20,200,.12) 0%,transparent 65%);bottom:-120px;right:-120px;animation-duration:28s;animation-direction:reverse;}
.orb3{width:400px;height:400px;background:radial-gradient(circle at 50% 50%,rgba(200,140,30,.08) 0%,transparent 65%);top:35%;left:50%;animation-duration:22s;animation-delay:-10s;}
@keyframes orbDrift{0%,100%{transform:translate(0,0) scale(1);}25%{transform:translate(50px,-35px) scale(1.05);}50%{transform:translate(-25px,60px) scale(.95);}75%{transform:translate(-55px,-20px) scale(1.02);}}
.grid-overlay{position:fixed;inset:0;z-index:0;pointer-events:none;background-image:linear-gradient(rgba(100,140,255,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(100,140,255,.025) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 90% 90% at 50% 50%,black 30%,transparent 100%);}
.stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.star{position:absolute;background:#fff;border-radius:50%;animation:starTwinkle ease-in-out infinite;}
@keyframes starTwinkle{0%,100%{opacity:.08;transform:scale(1);}50%{opacity:.7;transform:scale(1.8);}}
.header{position:sticky;top:0;z-index:300;height:var(--header-h);display:flex;align-items:center;padding:0 14px;gap:10px;background:rgba(4,7,15,.88);backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--border2);}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(58,107,255,.4),rgba(212,164,76,.3),transparent);animation:hShimmer 8s linear infinite;background-size:200%;}
@keyframes hShimmer{0%{background-position:0%}100%{background-position:200%}}
.logo-wrap{display:flex;align-items:center;gap:10px;flex:1;min-width:0;}
.logo-emblem{width:34px;height:34px;flex-shrink:0;}
.logo-emblem svg{width:100%;height:100%;}
.logo-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;background:linear-gradient(100deg,#e8eeff 0%,#a0bfff 40%,#d4a44c 80%,#f7e0a0 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:300%;animation:lShimmer 8s linear infinite;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
@keyframes lShimmer{0%{background-position:0%}100%{background-position:300%}}
.logo-year{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);font-weight:500;}
.header-right{display:flex;gap:6px;align-items:center;flex-shrink:0;}
.uDot{width:7px;height:7px;border-radius:50%;background:var(--gold2);opacity:0;transition:opacity .4s;animation:pRing 1.5s ease infinite;}
.uDot.show{opacity:1;}
@keyframes pRing{0%{box-shadow:0 0 0 0 rgba(212,164,76,.8);}70%{box-shadow:0 0 0 7px rgba(212,164,76,0);}100%{box-shadow:0 0 0 0 rgba(212,164,76,0);}}
.ibtn{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;background:transparent;border:1px solid var(--border2);color:var(--text2);font-size:15px;cursor:pointer;transition:all .2s;flex-shrink:0;font-family:'DM Sans',sans-serif;}
.ibtn:active{background:var(--bg3);color:var(--text);}
.ibtn.gold{background:linear-gradient(135deg,#b8882a,#d4a44c);border-color:transparent;color:#0d0800;font-size:13px;}
.ticker-bar{position:relative;z-index:1;height:28px;background:rgba(7,16,30,.9);border-bottom:1px solid var(--border);display:flex;align-items:center;overflow:hidden;}
.ticker-inner{display:flex;white-space:nowrap;animation:tScroll 50s linear infinite;}
@keyframes tScroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.ticker-item{display:inline-flex;align-items:center;gap:6px;padding:0 18px;font-size:9px;letter-spacing:.13em;text-transform:uppercase;color:var(--text2);font-weight:500;border-right:1px solid var(--border);}
.ticker-item .dot{width:3px;height:3px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.tFade{position:absolute;top:0;bottom:0;width:40px;pointer-events:none;z-index:2;}
.tFade-l{left:0;background:linear-gradient(to right,var(--bg),transparent);}
.tFade-r{right:0;background:linear-gradient(to left,var(--bg),transparent);}
.month-nav{position:relative;z-index:2;display:flex;align-items:center;padding:8px 12px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;border-bottom:1px solid var(--border);background:rgba(4,7,15,.5);backdrop-filter:blur(8px);gap:6px;}
.month-nav::-webkit-scrollbar{display:none;}
.mnbtn{white-space:nowrap;flex-shrink:0;padding:5px 12px;border-radius:100px;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2);transition:all .2s;font-family:'DM Sans',sans-serif;}
.mnbtn.active{background:rgba(58,107,255,.15);color:var(--accent3);border-color:rgba(58,107,255,.3);}
.mnbtn:active{transform:scale(.94);}
.year-progress{position:relative;z-index:1;padding:8px 14px;display:flex;align-items:center;gap:10px;}
.prog-label{font-size:9px;color:var(--text2);letter-spacing:.13em;text-transform:uppercase;font-weight:500;white-space:nowrap;}
.prog-track{flex:1;height:2px;background:rgba(120,160,255,.1);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--gold));transform-origin:left;animation:pFill 1.5s cubic-bezier(.22,1,.36,1) .5s both;}
@keyframes pFill{from{transform:scaleX(0);}to{transform:scaleX(1);}}
.prog-pct{font-size:9px;color:var(--gold2);font-weight:600;white-space:nowrap;}
.main{position:relative;z-index:1;padding:14px 10px 20px;}
.year-banner{text-align:center;margin-bottom:24px;opacity:0;transform:translateY(20px);animation:rUp .7s cubic-bezier(.22,1,.36,1) .1s forwards;}
.year-number{font-family:'Playfair Display',serif;font-size:clamp(52px,18vw,110px);font-weight:900;letter-spacing:-.03em;line-height:1;background:linear-gradient(180deg,#e8eeff 0%,rgba(100,140,255,.3) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.year-sub{font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--text2);margin-top:8px;font-weight:500;}
.year-line{width:70px;height:1px;margin:12px auto 0;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.month-section{margin-bottom:36px;opacity:0;transform:translateY(28px);animation:rUp .6s cubic-bezier(.22,1,.36,1) forwards;}
@keyframes rUp{to{opacity:1;transform:translateY(0);}}
.month-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border);position:relative;}
.month-header::after{content:'';position:absolute;bottom:-1px;left:0;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--gold),transparent);width:0;animation:lExpand .8s cubic-bezier(.22,1,.36,1) forwards;animation-delay:inherit;}
@keyframes lExpand{to{width:90px;}}
.month-name-wrap{display:flex;align-items:baseline;gap:7px;}
.month-name{font-family:'Playfair Display',serif;font-size:clamp(20px,5.5vw,34px);font-weight:700;color:var(--text);letter-spacing:-.01em;line-height:1;}
.month-ordinal{font-family:'Playfair Display',serif;font-size:12px;font-style:italic;color:var(--text2);}
.month-stats{display:flex;gap:14px;}
.mstat-val{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text);line-height:1;text-align:right;}
.mstat-lbl{font-size:7px;color:var(--text2);text-transform:uppercase;letter-spacing:.15em;margin-top:2px;font-weight:500;text-align:right;}
.cal-wrap{border-radius:var(--radius);border:1px solid var(--border2);overflow:hidden;background:var(--card);box-shadow:0 16px 48px rgba(0,0,0,.4);}
.cal-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.cal-table thead tr{background:linear-gradient(to bottom,rgba(58,107,255,.07),rgba(58,107,255,.02));}
.cal-table th{padding:8px 2px;font-size:8px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;text-align:center;color:var(--text2);border-bottom:1px solid var(--border);}
.cal-table th.h-sat{color:var(--sat);}
.cal-table th.h-sun{color:var(--sun);}
.cal-cell{background:var(--card);vertical-align:top;padding:5px 3px 5px;min-height:80px;border:1px solid var(--border);position:relative;cursor:pointer;overflow:hidden;transition:background .2s,border-color .2s;-webkit-user-select:none;user-select:none;}
.cal-cell:active{background:var(--card3);border-color:var(--border3);}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
.cal-cell.is-sun .day-num{color:var(--sun);}
.cal-cell.is-sat .day-num{color:var(--sat);}
.cal-cell.has-hol{background:linear-gradient(135deg,var(--hol-bg),var(--card));}
.cal-cell.is-today{border-color:rgba(212,164,76,.35) !important;background:linear-gradient(135deg,rgba(212,164,76,.07),var(--card)) !important;}
.cal-cell.is-today .day-num{background:linear-gradient(135deg,#d4a44c,#f7e0a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.day-num{font-family:'Playfair Display',serif;font-size:12px;font-weight:700;color:var(--text);display:block;text-align:center;line-height:1;margin-bottom:3px;}
.hol-icon-sm{display:block;text-align:center;font-size:9px;margin-bottom:2px;}
.ev-chips{display:flex;flex-direction:column;gap:2px;padding:0 1px;margin-top:2px;}
.ev-chip{display:block;width:100%;padding:2px 4px;border-radius:3px;font-size:8px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.4;}
.ev-more{font-size:7px;color:var(--text2);text-align:center;padding-top:1px;font-weight:600;}
.ev-count{display:none;}
.ec-nafas{background:rgba(16,185,129,.12);color:#2dd4a0;border:1px solid rgba(16,185,129,.18);}
.ec-nafas .ev-dot-sm{background:#2dd4a0;}
.ec-einv{background:rgba(124,58,237,.14);color:#b39eff;border:1px solid rgba(124,58,237,.2);}
.ec-einv .ev-dot-sm{background:#b39eff;}
.ec-pert{background:rgba(234,140,0,.13);color:#ffc850;border:1px solid rgba(234,140,0,.2);}
.ec-pert .ev-dot-sm{background:#ffc850;}
.ec-hrd{background:rgba(37,99,235,.14);color:#7eb5ff;border:1px solid rgba(37,99,235,.2);}
.ec-hrd .ev-dot-sm{background:#7eb5ff;}
.ec-pink{background:rgba(219,39,119,.13);color:#fb7fc6;border:1px solid rgba(219,39,119,.2);}
.ec-pink .ev-dot-sm{background:#fb7fc6;}
.ec-teal{background:rgba(13,148,136,.13);color:#2dd4bf;border:1px solid rgba(13,148,136,.2);}
.ec-teal .ev-dot-sm{background:#2dd4bf;}
.ec-red{background:rgba(220,38,38,.12);color:#f87171;border:1px solid rgba(220,38,38,.18);}
.ec-red .ev-dot-sm{background:#f87171;}
.ec-gray{background:rgba(71,85,105,.14);color:#94a3b8;border:1px solid rgba(71,85,105,.2);}
.ec-gray .ev-dot-sm{background:#94a3b8;}
.ec-hol{background:rgba(255,60,60,.12);color:#ff9090;border:1px solid rgba(255,60,60,.22);font-size:7px;}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;z-index:200;display:flex;gap:8px;align-items:center;padding:10px 14px calc(10px + var(--safe-b));background:rgba(4,7,15,.92);backdrop-filter:blur(20px) saturate(180%);border-top:1px solid var(--border2);}
.bottom-bar::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(58,107,255,.25),rgba(212,164,76,.18),transparent);}
.uLabel{font-size:9px;color:var(--gold2);letter-spacing:.1em;text-transform:uppercase;font-weight:600;display:flex;align-items:center;gap:5px;opacity:0;transition:opacity .4s;flex:1;min-width:0;}
.uLabel.show{opacity:1;}
.uLabel-dot{width:5px;height:5px;border-radius:50%;background:var(--gold2);animation:pRing 1.5s ease infinite;flex-shrink:0;}
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0);backdrop-filter:blur(0px);pointer-events:none;transition:background .3s,backdrop-filter .3s;}
.modal-overlay.open{background:rgba(0,0,0,.72);backdrop-filter:blur(12px) saturate(150%);pointer-events:all;}
.modal{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(170deg,#101d36 0%,#08111f 100%);border:1px solid var(--border3);border-bottom:none;border-radius:24px 24px 0 0;padding:0 0 calc(20px + var(--safe-b));transform:translateY(100%);transition:transform .4s cubic-bezier(.32,1,.2,1);box-shadow:0 -24px 70px rgba(0,0,0,.6);max-height:92vh;overflow-y:auto;}
.modal::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(58,107,255,.5),rgba(212,164,76,.3),transparent);}
.modal-overlay.open .modal{transform:translateY(0);}
.modal-handle{display:flex;justify-content:center;padding:12px 0 2px;}
.handle-bar{width:36px;height:4px;border-radius:2px;background:var(--border3);}
.modal-inner{padding:0 18px 6px;}
.modal-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:18px;padding-top:2px;}
.modal-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;color:var(--text);line-height:1.1;}
.modal-date{font-size:11px;color:var(--accent2);margin-top:3px;letter-spacing:.04em;font-weight:500;}
.modal-close{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.06);border:1px solid var(--border2);color:var(--text2);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;}
.modal-close:active{background:rgba(255,255,255,.14);}
.modal-tabs{display:flex;margin-bottom:20px;border-radius:10px;overflow:hidden;border:1px solid var(--border2);background:rgba(255,255,255,.02);}
.mtab{flex:1;padding:10px 4px;text-align:center;font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;transition:all .2s;color:var(--text2);background:transparent;border:none;font-family:'DM Sans',sans-serif;}
.mtab.active{background:linear-gradient(135deg,rgba(58,107,255,.25),rgba(58,107,255,.15));color:var(--accent3);}
.tab-pane{display:none;}
.tab-pane.active{display:block;animation:fUp .2s ease;}
@keyframes fUp{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.fg{margin-bottom:16px;}
.flabel{display:block;font-size:9px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.2em;margin-bottom:7px;}
.finput{width:100%;padding:13px 14px;background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;appearance:none;}
.finput:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(58,107,255,.12);}
.finput::placeholder{color:var(--text3);}
.color-grid{display:flex;gap:10px;flex-wrap:wrap;}
.col-opt{width:40px;height:40px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;position:relative;}
.col-opt::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:2px solid transparent;transition:border-color .2s;}
.col-opt.sel{color:#fff !important;transform:scale(1.15);}
.col-opt.sel::after{border-color:rgba(255,255,255,.5);}
.col-opt:active{transform:scale(1.08);}
.co-nafas{background:#2dd4a0;}.co-einv{background:#b39eff;}.co-pert{background:#ffc850;}
.co-hrd{background:#7eb5ff;}.co-pink{background:#fb7fc6;}.co-teal{background:#2dd4bf;}
.co-red{background:#f87171;}.co-gray{background:#94a3b8;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:12px 18px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:all .18s;letter-spacing:.1em;text-transform:uppercase;position:relative;overflow:hidden;min-height:44px;}
.btn:active{transform:scale(.95);}
.btn-primary{background:linear-gradient(135deg,#2a58e8,#4878ff);color:#fff;box-shadow:0 4px 18px rgba(58,107,255,.28);}
.btn-gold{background:linear-gradient(135deg,#b8882a,#d4a44c);color:#0d0800;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:active{background:var(--bg3);}
.btn-danger{background:rgba(255,60,60,.08);color:#ff6060;border:1px solid rgba(255,60,60,.15);}
.btn-danger:active{background:rgba(255,60,60,.2);}
.btn-full{width:100%;}
.btn-row{display:flex;gap:8px;}
.btn-row .btn{flex:1;}
.manage-panel{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px;margin-bottom:14px;max-height:220px;overflow-y:auto;}
.manage-panel:empty::after{content:'No events on this date';color:var(--text3);font-size:12px;display:block;text-align:center;padding:14px 0;}
.mev-row{display:flex;align-items:center;gap:8px;padding:10px 8px;border-radius:8px;transition:background .15s;}
.mev-row:active{background:rgba(255,255,255,.04);}
.mev-dot2{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.mev-name{flex:1;font-size:13px;color:var(--text);}
.mev-del{padding:7px 12px;border-radius:7px;background:rgba(255,60,60,.1);color:#ff6060;border:1px solid rgba(255,60,60,.18);font-size:10px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;letter-spacing:.05em;text-transform:uppercase;min-height:36px;}
.mev-del:active{background:rgba(255,60,60,.25);}
.hol-current-box{font-size:12px;color:var(--hol-text);padding:10px 12px;background:rgba(255,60,60,.07);border-radius:9px;display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(255,60,60,.12);gap:8px;}
.legend-sheet{position:fixed;inset:0;z-index:450;background:rgba(0,0,0,0);pointer-events:none;transition:background .3s;}
.legend-sheet.open{background:rgba(0,0,0,.65);pointer-events:all;backdrop-filter:blur(8px);}
.legend-inner{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(170deg,#101d36,#08111f);border:1px solid var(--border3);border-bottom:none;border-radius:24px 24px 0 0;padding:12px 18px calc(20px + var(--safe-b));transform:translateY(100%);transition:transform .35s cubic-bezier(.32,1,.2,1);}
.legend-sheet.open .legend-inner{transform:translateY(0);}
.leg-handle{display:flex;justify-content:center;margin-bottom:14px;}
.leg-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;margin-bottom:14px;color:var(--text);}
.leg-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;}

// In-memory state — all data lives here during the session
let cal = JSON.parse(JSON.stringify(DEFAULTS));
let activeKey=null,selColor='ec-nafas',selDot='#2dd4a0',activeTab='add',dirty=false;

// Load from window.storage if available (Claude artifact persistent storage)
async function loadFromStorage(){
  try{
    if(window.storage){
      const result=await window.storage.get('koikma_2026_cal');
      if(result&&result.value){
        cal=JSON.parse(result.value);
        renderAll();
        showToast('📅','Schedule loaded');
      }
    }
  }catch(e){
    // Key not found or storage unavailable — use defaults (already set)
  }
}

async function saveData(){
  try{
    if(window.storage){
      await window.storage.set('koikma_2026_cal',JSON.stringify(cal));
      dirty=false;
      document.getElementById('uDot').classList.remove('show');
      document.getElementById('uLabel').classList.remove('show');
      showToast('💾','Saved!');
    } else {
      showToast('⚠️','Storage not available');
    }
  }catch(e){
    showToast('⚠️','Save failed');
  }
}

async function resetAll(){
  if(!confirm('Reset all data to default?'))return;
  cal=JSON.parse(JSON.stringify(DEFAULTS));
  try{
    if(window.storage) await window.storage.delete('koikma_2026_cal');
  }catch(e){}
  dirty=false;
  document.getElementById('uDot').classList.remove('show');
  document.getElementById('uLabel').classList.remove('show');
  renderAll();
  showToast('↺','Reset to defaults');
}

function markDirty(){dirty=true;document.getElementById('uDot').classList.add('show');document.getElementById('uLabel').classList.add('show');}

function buildTicker(){
  const items=['KoIKMa 2026','May—December','NAFAS','E-INV','PERT Reviews','HRD Trainings','Labour Day · 1 May','Hari Raya Haji · 27 May','Agong Birthday · 1 Jun','Merdeka Day · 31 Aug','Malaysia Day · 16 Sep','Deepavali · 9 Nov','Christmas · 25 Dec'];
  document.getElementById('ticker').innerHTML=[...items,...items].map(t=>`<div class="ticker-item"><div class="dot"></div>${t}</div>`).join('');
}

function buildMonthNav(){
  document.getElementById('monthNav').innerHTML=MONTHS.map((m,i)=>`<button class="mnbtn${i===0?' active':''}" onclick="goToMonth(${i},this)">${m.name}</button>`).join('');
}
function goToMonth(idx,btn){
  document.querySelectorAll('.mnbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  btn.scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});
  const sec=document.querySelectorAll('.month-section')[idx];
  if(sec)window.scrollTo({top:sec.getBoundingClientRect().top+window.scrollY-110,behavior:'smooth'});
}

function updateProgress(){
  const start=new Date(2026,4,1),end=new Date(2026,11,31),now=new Date();
  const pct=Math.max(0,Math.min(100,((now-start)/(end-start))*100));
  document.getElementById('progFill').style.width=pct.toFixed(1)+'%';
  document.getElementById('progPct').textContent=pct.toFixed(0)+'%';
}

function key(y,m,d){return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
const today=new Date(),todayKey=key(today.getFullYear(),today.getMonth()+1,today.getDate());

function renderAll(){
  const main=document.getElementById('main'),banner=main.querySelector('.year-banner');
  main.innerHTML='';if(banner)main.appendChild(banner);
  MONTHS.forEach((m,mi)=>{
    let ev=0,hol=0;
    for(let d=1;d<=m.days;d++){const k=key(m.year,m.num,d),c=cal[k];if(c){if(c.e&&c.e.length)ev+=c.e.length;if(c.h)hol++;}}
    const sec=document.createElement('div');
    sec.className='month-section';sec.style.animationDelay=(mi*.07+.12)+'s';
    sec.innerHTML=`
      <div class="month-header" style="animation-delay:${mi*.07+.12}s">
        <div class="month-name-wrap">
          <div class="month-name">${m.name}</div>
          <div class="month-ordinal">'${String(m.year).slice(2)}</div>
        </div>
        <div class="month-stats">
          <div><div class="mstat-val">${ev}</div><div class="mstat-lbl">Events</div></div>
          <div><div class="mstat-val">${hol}</div><div class="mstat-lbl">Hols</div></div>
        </div>
      </div>
      <div class="cal-wrap">
        <table class="cal-table">
          <thead><tr><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th class="h-sat">S</th><th class="h-sun">S</th></tr></thead>
          <tbody id="tb-${mi}"></tbody>
        </table>
      </div>`;
    main.appendChild(sec);

    const tbody=sec.querySelector(`#tb-${mi}`);
    let cells=[];
    for(let i=0;i<m.start;i++)cells.push(null);
    for(let d=1;d<=m.days;d++)cells.push(d);
    while(cells.length%7)cells.push(null);

    for(let r=0;r<cells.length/7;r++){
      const tr=document.createElement('tr');
      for(let c=0;c<7;c++){
        const day=cells[r*7+c];
        const td=document.createElement('td');
        if(!day){td.className='cal-cell empty';}
        else{
          const k=key(m.year,m.num,day),data=cal[k]||{h:'',e:[]};
          const isSun=c===6,isSat=c===5,hasHol=!!data.h,isToday=k===todayKey;
          td.className='cal-cell'+(isSun?' is-sun':'')+(isSat?' is-sat':'')+(hasHol?' has-hol':'')+(isToday?' is-today':'');
          const evs=data.e||[];
          const MAX_SHOW=3;
          const holChip=hasHol?`<span class="ev-chip ec-hol">🏖 ${data.h}</span>`:'';
          const evChips=evs.slice(0,MAX_SHOW).map(ev=>`<span class="ev-chip ${ev.c}">${ev.n}</span>`).join('');
          const moreChip=evs.length>MAX_SHOW?`<div class="ev-more">+${evs.length-MAX_SHOW} more</div>`:'';
          td.innerHTML=`<span class="day-num">${day}</span><div class="ev-chips">${holChip}${evChips}${moreChip}</div>`;
          td.addEventListener('click',()=>openModal(null,k,`${m.name} ${day}, ${m.year}`));
        }
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
  });

  // Scroll spy
  setTimeout(()=>{
    const secs=document.querySelectorAll('.month-section'),btns=document.querySelectorAll('.mnbtn');
    if(!secs.length)return;
    const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){const i=[...secs].indexOf(e.target);if(i>=0){btns.forEach(b=>b.classList.remove('active'));btns[i].classList.add('active');btns[i].scrollIntoView({block:'nearest',inline:'center',behavior:'smooth'});}}});},{threshold:.3,rootMargin:'-105px 0px -55% 0px'});
    secs.forEach(s=>obs.observe(s));
  },80);
}

function openModal(e,k,label){
  if(e)e.stopPropagation();
  activeKey=k;
  document.getElementById('mDate').textContent=label;
  document.getElementById('evtName').value='';
  document.getElementById('holName').value='';
  selColor='ec-nafas';selDot='#2dd4a0';
  document.querySelectorAll('.col-opt').forEach(o=>o.classList.toggle('sel',o.dataset.cls==='ec-nafas'));
  switchTab('add');
  document.getElementById('modal').classList.add('open');
  if(!('ontouchstart' in window))setTimeout(()=>document.getElementById('evtName').focus(),400);
}
function closeModal(){document.getElementById('modal').classList.remove('open');}

function switchTab(t){
  activeTab=t;
  document.querySelectorAll('.mtab').forEach((b,i)=>b.classList.toggle('active',['add','manage','holiday'][i]===t));
  document.querySelectorAll('.tab-pane').forEach((p,i)=>p.classList.toggle('active',['tab-add','tab-manage','tab-holiday'][i]==='tab-'+t));
  if(t==='manage')renderManagePanel();
  if(t==='holiday')renderHolidayTab();
}

function renderManagePanel(){
  const panel=document.getElementById('managePanel'),data=cal[activeKey]||{h:'',e:[]};
  if(!data.e||!data.e.length){panel.innerHTML='';return;}
  panel.innerHTML=data.e.map((ev,i)=>`<div class="mev-row" id="mev-${i}"><div class="mev-dot2" style="background:${DOT_MAP[ev.c]||'#94a3b8'}"></div><span class="mev-name">${ev.n}</span><button class="mev-del" onclick="delFromPanel(${i})">✕</button></div>`).join('');
}
function renderHolidayTab(){
  const data=cal[activeKey]||{h:'',e:[]},wrap=document.getElementById('holCurrentWrap');
  if(data.h){wrap.style.display='block';document.getElementById('holCurrentText').textContent=data.h;}
  else wrap.style.display='none';
}
function delFromPanel(idx){
  doDelEvent(activeKey,idx);
  renderManagePanel();
}
function doDelEvent(k,idx){
  if(!cal[k])return;
  const name=cal[k].e[idx]?.n||'Event';
  cal[k].e.splice(idx,1);
  markDirty();
  renderAll();
  showToast('🗑','Removed: '+name);
}
function pickColor(el){selColor=el.dataset.cls;selDot=el.dataset.dot;document.querySelectorAll('.col-opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');}
function addEvent(){
  const n=document.getElementById('evtName').value.trim();
  if(!n){showToast('⚠️','Enter a name');return;}
  if(!cal[activeKey])cal[activeKey]={h:'',e:[]};
  cal[activeKey].e.push({n,c:selColor});
  markDirty();
  closeModal();
  renderAll();
  showToast('✨','Added: '+n+' — tap 💾 to save!');
}
function setHoliday(){
  const h=document.getElementById('holName').value.trim();
  if(!h){showToast('⚠️','Enter holiday name');return;}
  if(!cal[activeKey])cal[activeKey]={h:'',e:[]};
  cal[activeKey].h=h;
  markDirty();
  closeModal();
  renderAll();
  showToast('🏖','Holiday set — tap 💾 to save!');
}
function removeHoliday(){
  if(!cal[activeKey])return;
  const name=cal[activeKey].h;
  cal[activeKey].h='';
  markDirty();
  closeModal();
  renderAll();
  showToast('🗑','Removed: '+name);
}

function openLS(){document.getElementById('legendSheet').classList.add('open');}
function closeLS(){document.getElementById('legendSheet').classList.remove('open');}

let tT;
function showToast(icon,msg){clearTimeout(tT);document.getElementById('tIcon').textContent=icon;document.getElementById('tMsg').textContent=msg;const t=document.getElementById('toast');t.classList.add('show');tT=setTimeout(()=>t.classList.remove('show'),3000);}

// Swipe to close modal
(function(){
  let sy=0,dragging=false;
  const m=document.getElementById('modalInner');
  m.addEventListener('touchstart',e=>{if(e.touches[0].clientY<m.getBoundingClientRect().top+70){sy=e.touches[0].clientY;dragging=true;}},{passive:true});
  m.addEventListener('touchmove',e=>{if(!dragging)return;const dy=e.touches[0].clientY-sy;if(dy>0)m.style.transform=`translateY(${dy}px)`;},{passive:true});
  m.addEventListener('touchend',e=>{if(!dragging)return;dragging=false;const dy=e.changedTouches[0].clientY-sy;m.style.transform='';if(dy>80)closeModal();});
})();

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeModal();closeLS();}
  if(e.key==='Enter'&&document.getElementById('modal').classList.contains('open')){if(activeTab==='add')addEvent();else if(activeTab==='holiday')setHoliday();}
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveData();}
});
document.getElementById('modal').addEventListener('click',function(e){if(e.target===this)closeModal();});
document.getElementById('legendSheet').addEventListener('click',function(e){if(e.target===this)closeLS();});

buildTicker();buildMonthNav();updateProgress();renderAll();
loadFromStorage();
</script>
</body>
</html>
