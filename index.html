<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MangaVault Reader</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f14;
  color:white;
}

header {
  padding:12px;
  background:#1a1a22;
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

button {
  padding:10px 12px;
  border:none;
  border-radius:8px;
  background:#e63946;
  color:white;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#1a1a22;
  padding:10px;
  border-radius:10px;
  cursor:pointer;
}

.title { font-weight:bold; font-size:14px; }
.small { font-size:12px; color:#aaa; }

#reader {
  position:fixed;
  inset:0;
  background:black;
  display:none;
  flex-direction:column;
}

#readerTop {
  padding:10px;
  background:#111;
  display:flex;
  justify-content:space-between;
}

#imgBox {
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
}

#imgBox img {
  max-width:100%;
  max-height:100%;
}

.controls {
  display:flex;
  justify-content:space-between;
  padding:10px;
  background:#111;
}
</style>
</head>

<body>

<header>
  <input id="search" placeholder="Search manga">
  <button onclick="searchManga()">Search</button>
</header>

<div id="list" class="grid"></div>

<!-- READER -->
<div id="reader">
  <div id="readerTop">
    <div id="chapterTitle">Loading...</div>
    <button onclick="closeReader()">X</button>
  </div>

  <div id="imgBox">
    <img id="pageImg" src="">
  </div>

  <div class="controls">
    <button onclick="prevPage()">◀ Prev</button>
    <button onclick="nextPage()">Next ▶</button>
  </div>
</div>

<script>

const API = "https://manga-app-fjwl.onrender.com";

let pages = [];
let pageIndex = 0;
let currentChapterId = "";

// ---------------- SEARCH ----------------
async function searchManga() {
  const q = document.getElementById("search").value;
  const list = document.getElementById("list");

  list.innerHTML = "Loading...";

  const res = await fetch(`${API}/search?q=${q}`);
  const data = await res.json();

  list.innerHTML = "";

  data.data.forEach(m => {

    const title =
      m.attributes?.title?.en ||
      Object.values(m.attributes?.title || {})[0] ||
      "Unknown";

    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <div class="title">${title}</div>
      <div class="small">Open reader</div>
    `;

    div.onclick = () => openChapters(m.id, title);

    list.appendChild(div);
  });
}

// ---------------- CHAPTER LIST ----------------
async function openChapters(id, title) {

  // get chapters
  const res = await fetch(`https://api.mangadex.org/chapter?manga=${id}&translatedLanguage[]=en&limit=10`);
  const data = await res.json();

  if (!data.data.length) {
    alert("No chapters found");
    return;
  }

  // open first chapter automatically
  const chapter = data.data[0];
  loadChapter(chapter.id, title);
}

// ---------------- LOAD CHAPTER ----------------
async function loadChapter(chapterId, title) {

  currentChapterId = chapterId;
  pageIndex = 0;

  const res = await fetch(`https://api.mangadex.org/at-home/server/${chapterId}`);
  const data = await res.json();

  const base = data.baseUrl;
  const hash = data.chapter.hash;
  pages = data.chapter.data.map(p => `${base}/data/${hash}/${p}`);

  document.getElementById("reader").style.display = "flex";
  document.getElementById("chapterTitle").innerText = title;

  showPage();
}

// ---------------- PAGE CONTROL ----------------
function showPage() {
  document.getElementById("pageImg").src = pages[pageIndex];
}

function nextPage() {
  if (pageIndex < pages.length - 1) {
    pageIndex++;
    showPage();
  }
}

function prevPage() {
  if (pageIndex > 0) {
    pageIndex--;
    showPage();
  }
}

function closeReader() {
  document.getElementById("reader").style.display = "none";
}

</script>

</body>
</html>
