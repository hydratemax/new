<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MangaVault Pro</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0f0f14;
  color:white;
}

header {
  padding:15px;
  background:#1a1a22;
  display:flex;
  gap:10px;
}

input {
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
}

button {
  padding:10px 14px;
  border:none;
  background:#e63946;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

.grid {
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#1a1a22;
  padding:10px;
  border-radius:10px;
}

.title {
  font-size:14px;
  margin-top:8px;
}

.small {
  font-size:12px;
  color:#aaa;
}

.loader {
  padding:20px;
  text-align:center;
  color:#aaa;
}
</style>
</head>

<body>

<header>
  <input id="search" placeholder="Search manga...">
  <button onclick="searchManga()">Search</button>
</header>

<div id="output" class="grid"></div>

<script>

const API = "https://manga-app-fjwl.onrender.com";

async function searchManga() {
  const q = document.getElementById("search").value;
  const output = document.getElementById("output");

  output.innerHTML = `<div class="loader">Loading...</div>`;

  try {
    const res = await fetch(`${API}/search?q=${encodeURIComponent(q)}`);
    const data = await res.json();

    // DEBUG: if backend returns raw text, still handle it
    if (!data || !data.data) {
      output.innerHTML = `<div class="loader">No results or API error</div>`;
      return;
    }

    output.innerHTML = "";

    data.data.forEach(item => {

      const title =
        item.attributes?.title?.en ||
        Object.values(item.attributes?.title || {})[0] ||
        "Unknown";

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <div class="title">${title}</div>
        <div class="small">ID: ${item.id}</div>
      `;

      output.appendChild(div);
    });

  } catch (err) {
    output.innerHTML = `<div class="loader">Error connecting API</div>`;
  }
}

</script>

</body>
</html>
