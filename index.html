<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KoIKMa Planner 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;0,900;1,400;1,700&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #04070f;
  --bg2: #07101e;
  --bg3: #0b1829;
  --card: #090f1d;
  --card2: #0d1628;
  --card3: #111e32;
  --border: rgba(120,160,255,0.07);
  --border2: rgba(120,160,255,0.13);
  --border3: rgba(120,160,255,0.22);
  --border4: rgba(120,160,255,0.35);
  --text: #e8eeff;
  --text2: #5a6b96;
  --text3: #2a3552;
  --accent: #3a6bff;
  --accent2: #6a96ff;
  --accent3: #a0bfff;
  --gold: #d4a44c;
  --gold2: #eec976;
  --gold3: #f7e0a0;
  --sun: #ff5c5c;
  --sat: #ff8c42;
  --hol-bg: rgba(255,60,60,0.06);
  --hol-text: #ff8080;
  --radius: 16px;
  --radius-sm: 10px;
  --glow-accent: rgba(58,107,255,0.18);
  --glow-gold: rgba(212,164,76,0.15);
  --header-h: 64px;
}

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}

body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
}

body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:200px;
}

.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.orb{position:absolute;border-radius:50%;animation:orbDrift linear infinite;mix-blend-mode:screen;}
.orb1{width:600px;height:600px;background:radial-gradient(circle at 40% 40%, rgba(40,80,255,0.2) 0%, transparent 65%);top:-150px;left:-150px;animation-duration:35s;}
.orb2{width:500px;height:500px;background:radial-gradient(circle at 60% 60%, rgba(100,20,200,0.15) 0%, transparent 65%);bottom:-100px;right:-100px;animation-duration:28s;animation-direction:reverse;}
.orb3{width:350px;height:350px;background:radial-gradient(circle at 50% 50%, rgba(200,140,30,0.1) 0%, transparent 65%);top:35%;left:50%;animation-duration:22s;animation-delay:-10s;}
@keyframes orbDrift{
  0%,100%{transform:translate(0,0) scale(1);}
  33%{transform:translate(40px,-30px) scale(1.05);}
  66%{transform:translate(-40px,30px) scale(0.95);}
}

.grid-overlay{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:linear-gradient(rgba(100,140,255,0.025) 1px, transparent 1px),linear-gradient(90deg, rgba(100,140,255,0.025) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 90% 90% at 50% 50%, black 30%, transparent 100%);
}

.stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.star{position:absolute;background:#fff;border-radius:50%;animation:starTwinkle ease-in-out infinite;}
@keyframes starTwinkle{0%,100%{opacity:0.08;transform:scale(1);}50%{opacity:0.6;transform:scale(1.6);}}

/* ── HEADER ── */
.header{
  position:sticky;top:0;z-index:300;
  height:var(--header-h);
  display:flex;align-items:center;gap:12px;
  padding:0 16px;
  background:rgba(4,7,15,0.9);
  backdrop-filter:blur(24px) saturate(200%);
  border-bottom:1px solid var(--border2);
  box-shadow:0 0 40px rgba(0,0,0,0.5);
}

.header::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent 0%,rgba(58,107,255,0.4) 30%,rgba(212,164,76,0.4) 60%,transparent 100%);
  animation:headerShimmer 8s linear infinite;background-size:200%;
}
@keyframes headerShimmer{0%{background-position:0%}100%{background-position:200%}}

.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;flex:1;min-width:0;}
.logo-emblem{width:36px;height:36px;flex-shrink:0;}
.logo-emblem svg{width:100%;height:100%;}
.logo-text-group{display:flex;flex-direction:column;gap:1px;min-width:0;}
.logo-name{
  font-family:'Playfair Display',serif;
  font-size:16px;font-weight:700;letter-spacing:0.02em;
  background:linear-gradient(100deg,#e8eeff 0%,#a0bfff 40%,#d4a44c 80%,#f7e0a0 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  background-size:300%;animation:logoShimmer 8s linear infinite;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
@keyframes logoShimmer{0%{background-position:0%}100%{background-position:300%}}
.logo-year{font-size:8px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text2);font-weight:500;}

.header-right{display:flex;gap:6px;align-items:center;flex-shrink:0;}

.unsaved-badge{
  display:flex;align-items:center;gap:4px;
  font-size:8px;color:var(--gold2);letter-spacing:.1em;text-transform:uppercase;font-weight:600;
  opacity:0;transition:opacity .4s;
  padding:4px 8px;border-radius:100px;
  border:1px solid rgba(212,164,76,0.2);background:rgba(212,164,76,0.06);
}
.unsaved-badge.show{opacity:1;}
.pulse-ring{width:5px;height:5px;border-radius:50%;background:var(--gold2);animation:pulseRing 1.5s ease infinite;flex-shrink:0;}
@keyframes pulseRing{0%{box-shadow:0 0 0 0 rgba(212,164,76,.8);}70%{box-shadow:0 0 0 6px rgba(212,164,76,0);}100%{box-shadow:0 0 0 0 rgba(212,164,76,0);}}

/* Mobile menu button */
.menu-btn{
  width:36px;height:36px;border-radius:8px;
  background:transparent;border:1px solid var(--border2);
  color:var(--text2);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:4px;padding:8px;
  transition:all .2s;
}
.menu-btn:hover{background:var(--bg3);color:var(--text);}
.menu-btn span{display:block;width:100%;height:1.5px;background:currentColor;border-radius:2px;transition:all .3s;}
.menu-btn.open span:nth-child(1){transform:translateY(5.5px) rotate(45deg);}
.menu-btn.open span:nth-child(2){opacity:0;transform:scaleX(0);}
.menu-btn.open span:nth-child(3){transform:translateY(-5.5px) rotate(-45deg);}

/* Buttons */
.btn{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 14px;border-radius:var(--radius-sm);
  font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;
  cursor:pointer;border:none;transition:all .2s;
  letter-spacing:.08em;text-transform:uppercase;
  position:relative;overflow:hidden;white-space:nowrap;
}
.btn:active{transform:scale(0.94);}
.btn-primary{background:linear-gradient(135deg,#2a58e8,#4878ff);color:#fff;box-shadow:0 4px 20px rgba(58,107,255,0.3);}
.btn-primary:hover{box-shadow:0 6px 28px rgba(58,107,255,0.5);}
.btn-gold{background:linear-gradient(135deg,#b8882a,#d4a44c);color:#0d0800;box-shadow:0 4px 20px rgba(212,164,76,0.25);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--bg3);color:var(--text);border-color:var(--border3);}
.btn-danger{background:rgba(255,60,60,0.08);color:#ff6060;border:1px solid rgba(255,60,60,0.15);}
.btn-danger:hover{background:rgba(255,60,60,0.18);}

/* ── SLIDE-DOWN PANEL (mobile menu) ── */
.mobile-panel{
  position:fixed;top:var(--header-h);left:0;right:0;z-index:290;
  background:rgba(7,16,30,0.97);
  backdrop-filter:blur(24px);
  border-bottom:1px solid var(--border2);
  padding:16px;
  transform:translateY(-110%);
  transition:transform .35s cubic-bezier(.22,1,.36,1);
  box-shadow:0 20px 40px rgba(0,0,0,0.6);
}
.mobile-panel.open{transform:translateY(0);}

.panel-actions{display:flex;gap:8px;margin-bottom:14px;}
.panel-actions .btn{flex:1;justify-content:center;}

.legend{display:flex;gap:10px;align-items:center;flex-wrap:wrap;}
.leg-item{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--text2);letter-spacing:.05em;text-transform:uppercase;font-weight:500;}
.leg-dot{width:7px;height:7px;border-radius:2px;flex-shrink:0;}

/* ── TICKER ── */
.ticker-bar{
  position:relative;z-index:1;height:32px;
  background:rgba(8,14,28,0.9);border-bottom:1px solid var(--border);
  display:flex;align-items:center;overflow:hidden;
}
.ticker-inner{display:flex;gap:0;white-space:nowrap;animation:tickerScroll 60s linear infinite;}
.ticker-inner:hover{animation-play-state:paused;}
@keyframes tickerScroll{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.ticker-item{display:inline-flex;align-items:center;gap:6px;padding:0 20px;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--text2);font-weight:500;border-right:1px solid var(--border);}
.ticker-item .dot{width:3px;height:3px;border-radius:50%;background:var(--gold);flex-shrink:0;}
.ticker-fade{position:absolute;top:0;bottom:0;width:50px;pointer-events:none;z-index:2;}
.ticker-fade-l{left:0;background:linear-gradient(to right,var(--bg),transparent);}
.ticker-fade-r{right:0;background:linear-gradient(to left,var(--bg),transparent);}

/* ── PROGRESS ── */
.year-progress{
  position:relative;z-index:1;padding:14px 16px;
  background:linear-gradient(to bottom,rgba(4,7,15,0),rgba(4,7,15,0.5));
  display:flex;align-items:center;gap:12px;
}
.prog-label{font-size:9px;color:var(--text2);letter-spacing:.12em;text-transform:uppercase;font-weight:500;white-space:nowrap;}
.prog-track{flex:1;height:2px;background:rgba(120,160,255,0.1);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--gold));transform-origin:left;animation:progFill 1.5s cubic-bezier(.22,1,.36,1) .8s both;}
@keyframes progFill{from{transform:scaleX(0);}to{transform:scaleX(1);}}
.prog-pct{font-size:9px;color:var(--gold2);font-weight:600;letter-spacing:.06em;white-space:nowrap;}

/* ── MAIN ── */
.main{
  position:relative;z-index:1;
  max-width:1560px;margin:0 auto;
  padding:28px 12px 80px;
}

/* ── YEAR BANNER ── */
.year-banner{
  text-align:center;margin-bottom:40px;position:relative;
  opacity:0;transform:translateY(20px);
  animation:revealUp .8s cubic-bezier(.22,1,.36,1) .1s forwards;
}
.year-number{
  font-family:'Playfair Display',serif;
  font-size:clamp(48px,14vw,120px);font-weight:900;letter-spacing:-0.03em;line-height:1;
  background:linear-gradient(180deg,#e8eeff 0%,rgba(100,140,255,0.3) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.year-sub{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);margin-top:10px;font-weight:500;}
.year-line{width:100px;height:1px;margin:16px auto 0;background:linear-gradient(90deg,transparent,var(--gold),transparent);}

@keyframes revealUp{to{opacity:1;transform:translateY(0);}}

/* ── MONTH SECTION ── */
.month-section{
  margin-bottom:48px;
  opacity:0;transform:translateY(30px);
  animation:revealUp .7s cubic-bezier(.22,1,.36,1) forwards;
}

.month-header{
  display:flex;align-items:flex-end;justify-content:space-between;
  margin-bottom:14px;padding-bottom:14px;
  border-bottom:1px solid var(--border);
  position:relative;flex-wrap:wrap;gap:8px;
}
.month-header::after{
  content:'';position:absolute;bottom:-1px;left:0;height:2px;border-radius:2px;
  background:linear-gradient(90deg,var(--accent),var(--gold),transparent);
  width:0;animation:lineExpand .8s cubic-bezier(.22,1,.36,1) forwards;
  animation-delay:inherit;
}
@keyframes lineExpand{to{width:100px;}}

.month-name-wrap{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;}
.month-name{font-family:'Playfair Display',serif;font-size:clamp(28px,7vw,44px);font-weight:700;color:var(--text);letter-spacing:-0.02em;line-height:1;}
.month-ordinal{font-family:'Playfair Display',serif;font-size:14px;font-style:italic;color:var(--text2);font-weight:400;}
.month-tag{font-size:9px;font-weight:600;color:var(--accent3);background:rgba(58,107,255,0.1);padding:3px 10px;border-radius:100px;letter-spacing:.08em;text-transform:uppercase;border:1px solid rgba(58,107,255,0.18);}

.month-stats{display:flex;gap:18px;}
.mstat{text-align:right;}
.mstat-val{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);line-height:1;}
.mstat-lbl{font-size:8px;color:var(--text2);text-transform:uppercase;letter-spacing:.15em;margin-top:3px;font-weight:500;}

/* ── CALENDAR WRAP ── */
.cal-wrap{
  border-radius:var(--radius);border:1px solid var(--border2);overflow:hidden;
  box-shadow:0 20px 60px rgba(0,0,0,0.4), 0 0 0 1px var(--border);
  background:var(--card);position:relative;
}
.cal-wrap::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(120,160,255,0.3),transparent);
  pointer-events:none;z-index:2;
}

.cal-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.cal-table thead tr{background:linear-gradient(to bottom,rgba(58,107,255,0.07),rgba(58,107,255,0.02));}
.cal-table th{
  padding:10px 2px;font-size:8px;font-weight:600;
  letter-spacing:.18em;text-transform:uppercase;text-align:center;
  color:var(--text2);border-bottom:1px solid var(--border);
}
.cal-table th.h-sat{color:var(--sat);}
.cal-table th.h-sun{color:var(--sun);}

/* ── CELLS ── */
.cal-cell{
  background:var(--card);vertical-align:top;
  padding:8px 6px 28px;
  min-height:90px;
  border:1px solid var(--border);
  transition:background .25s, border-color .25s;
  position:relative;cursor:pointer;overflow:hidden;
  /* Prevent text selection on tap */
  -webkit-user-select:none;user-select:none;
}
.cal-cell:active{background:var(--card2);}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
.cal-cell.is-sun .day-num{color:var(--sun);}
.cal-cell.is-sat .day-num{color:var(--sat);}
.cal-cell.has-hol{background:linear-gradient(135deg,var(--hol-bg),var(--card));}
.cal-cell.is-today{border-color:rgba(212,164,76,0.35) !important;background:linear-gradient(135deg,rgba(212,164,76,0.06),var(--card)) !important;}
.cal-cell.is-today .day-num{
  background:linear-gradient(135deg,#d4a44c,#f7e0a0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

.day-num{font-family:'Playfair Display',serif;font-size:13px;font-weight:700;color:var(--text);display:block;margin-bottom:4px;line-height:1;}

/* Holiday */
.hol-pill{
  display:flex;align-items:center;gap:3px;
  font-size:7.5px;font-weight:600;color:var(--hol-text);
  background:rgba(255,60,60,0.1);padding:2px 5px 2px 4px;border-radius:4px;
  border:1px solid rgba(255,60,60,0.18);margin-bottom:4px;letter-spacing:.03em;
  animation:chipIn .3s ease;text-transform:uppercase;
  word-break:break-word;line-height:1.2;
}
.hol-name{flex:1;min-width:0;}
.hol-del{cursor:pointer;opacity:.4;font-size:9px;flex-shrink:0;line-height:1;transition:opacity .15s;}
.hol-del:hover{opacity:1;}

/* Event chips */
.events-list{display:flex;flex-direction:column;gap:2px;}
.ev-chip{
  display:flex;align-items:center;gap:3px;
  font-size:8px;font-weight:600;
  padding:2px 5px 2px 5px;border-radius:4px;
  letter-spacing:.03em;cursor:default;
  animation:chipIn .25s cubic-bezier(.34,1.56,.64,1) both;
  text-transform:uppercase;line-height:1.3;
}
@keyframes chipIn{from{opacity:0;transform:scale(0.7);}to{opacity:1;transform:scale(1);}}
.ev-dot{width:4px;height:4px;border-radius:50%;flex-shrink:0;}
.ev-label{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ev-del{
  width:14px;height:14px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:8px;cursor:pointer;
  background:rgba(255,255,255,0.06);
  opacity:0;transition:opacity .15s;
  border:none;color:inherit;font-family:inherit;flex-shrink:0;
}
/* On mobile, always show delete */
@media (hover:none){.ev-del{opacity:0.6;}}
.ev-chip:hover .ev-del,.ev-chip:active .ev-del{opacity:1;}
.ev-del:hover,.ev-del:active{background:rgba(255,60,60,0.4);opacity:1 !important;}

/* Color classes */
.ec-nafas{background:rgba(16,185,129,.12);color:#2dd4a0;border:1px solid rgba(16,185,129,.18);}
.ec-nafas .ev-dot{background:#2dd4a0;}
.ec-einv{background:rgba(124,58,237,.14);color:#b39eff;border:1px solid rgba(124,58,237,.2);}
.ec-einv .ev-dot{background:#b39eff;}
.ec-pert{background:rgba(234,140,0,.13);color:#ffc850;border:1px solid rgba(234,140,0,.2);}
.ec-pert .ev-dot{background:#ffc850;}
.ec-hrd{background:rgba(37,99,235,.14);color:#7eb5ff;border:1px solid rgba(37,99,235,.2);}
.ec-hrd .ev-dot{background:#7eb5ff;}
.ec-pink{background:rgba(219,39,119,.13);color:#fb7fc6;border:1px solid rgba(219,39,119,.2);}
.ec-pink .ev-dot{background:#fb7fc6;}
.ec-teal{background:rgba(13,148,136,.13);color:#2dd4bf;border:1px solid rgba(13,148,136,.2);}
.ec-teal .ev-dot{background:#2dd4bf;}
.ec-red{background:rgba(220,38,38,.12);color:#f87171;border:1px solid rgba(220,38,38,.18);}
.ec-red .ev-dot{background:#f87171;}
.ec-gray{background:rgba(71,85,105,.14);color:#94a3b8;border:1px solid rgba(71,85,105,.2);}
.ec-gray .ev-dot{background:#94a3b8;}

/* Add btn */
.add-btn{
  position:absolute;bottom:6px;right:6px;
  width:20px;height:20px;border-radius:50%;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff;font-size:14px;line-height:20px;text-align:center;
  cursor:pointer;border:none;font-weight:300;
  opacity:0;
  transition:opacity .2s, transform .2s;
  box-shadow:0 3px 10px rgba(58,107,255,.4);
}
/* On mobile show add btn always */
@media (hover:none){.add-btn{opacity:0.7;}}
.cal-cell:hover .add-btn{opacity:1;}
.cal-cell:active .add-btn{opacity:1;}

/* ── MODAL ── */
.modal-overlay{
  position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,0);backdrop-filter:blur(0px);
  display:flex;align-items:flex-end;justify-content:center;
  pointer-events:none;transition:background .3s, backdrop-filter .3s;
}
.modal-overlay.open{background:rgba(0,0,0,.75);backdrop-filter:blur(12px) saturate(150%);pointer-events:all;}

.modal{
  background:linear-gradient(145deg, #0f1c34 0%, #09121e 100%);
  border:1px solid var(--border3);
  border-radius:22px 22px 0 0;
  padding:20px 20px 28px;
  width:100%;max-width:520px;
  transform:translateY(110%);opacity:0;
  transition:transform .4s cubic-bezier(.22,1,.36,1), opacity .25s;
  box-shadow:0 -20px 60px rgba(0,0,0,.6), 0 0 0 1px rgba(120,160,255,.08);
  position:relative;overflow:hidden;
  max-height:92dvh;overflow-y:auto;
}
/* Drag handle */
.modal::before{
  content:'';display:block;width:36px;height:4px;
  background:rgba(120,160,255,0.2);border-radius:2px;
  margin:0 auto 16px;
}
/* Top shimmer */
.modal::after{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,rgba(58,107,255,.5),rgba(212,164,76,.3),transparent);
  pointer-events:none;
}
.modal-overlay.open .modal{transform:translateY(0);opacity:1;}

/* Center modal on larger screens */
@media(min-width:640px){
  .modal-overlay{align-items:center;}
  .modal{border-radius:22px;max-width:460px;max-height:90vh;}
  .modal::before{display:none;}
}

.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:3px;}
.modal-date{font-size:11px;color:var(--accent2);margin-bottom:20px;letter-spacing:.05em;font-weight:500;}

.fg{margin-bottom:16px;}
.flabel{display:block;font-size:9px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.18em;margin-bottom:8px;}
.finput{
  width:100%;padding:12px 14px;
  background:rgba(255,255,255,.03);border:1px solid var(--border2);
  border-radius:var(--radius-sm);color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px; /* 16px+ prevents zoom on iOS */
  outline:none;transition:border-color .2s, box-shadow .2s;
  -webkit-appearance:none;
}
.finput:focus{border-color:var(--accent);background:rgba(58,107,255,.04);box-shadow:0 0 0 3px rgba(58,107,255,.12);}
.finput::placeholder{color:var(--text3);}

.color-grid{display:flex;gap:8px;flex-wrap:wrap;}
.col-opt{
  width:36px;height:36px;border-radius:50%;cursor:pointer;
  border:2px solid transparent;transition:all .2s;
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:transparent;position:relative;
}
.col-opt::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:2px solid transparent;transition:border-color .2s;}
.col-opt.sel{color:#fff !important;transform:scale(1.15);}
.col-opt.sel::after{border-color:rgba(255,255,255,.5);}
.col-opt:active{transform:scale(0.9);}
.co-nafas{background:#2dd4a0;}.co-einv{background:#b39eff;}.co-pert{background:#ffc850;}
.co-hrd{background:#7eb5ff;}.co-pink{background:#fb7fc6;}.co-teal{background:#2dd4bf;}
.co-red{background:#f87171;}.co-gray{background:#94a3b8;}

.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.modal-footer .btn{flex:1;justify-content:center;padding:12px 14px;font-size:11px;}

/* Modal tabs */
.modal-tabs{display:flex;gap:0;margin-bottom:20px;border-radius:10px;overflow:hidden;border:1px solid var(--border2);background:rgba(255,255,255,.02);}
.mtab{
  flex:1;padding:10px 4px;text-align:center;
  font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
  cursor:pointer;transition:all .2s;color:var(--text2);
  background:transparent;border:none;font-family:'DM Sans',sans-serif;
}
.mtab.active{background:linear-gradient(135deg,rgba(58,107,255,0.25),rgba(58,107,255,0.15));color:var(--accent3);}
.tab-pane{display:none;}
.tab-pane.active{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.manage-panel{
  background:rgba(255,255,255,.02);border:1px solid var(--border);
  border-radius:var(--radius-sm);padding:8px;margin-bottom:14px;
  max-height:200px;overflow-y:auto;
}
.manage-panel:empty::after{content:'No events on this date';color:var(--text3);font-size:12px;display:block;text-align:center;padding:12px 0;}
.manage-panel::-webkit-scrollbar{width:3px;}
.manage-panel::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

.mev-row{display:flex;align-items:center;gap:8px;padding:8px;border-radius:7px;transition:background .15s;animation:chipIn .2s ease both;}
.mev-row:hover,.mev-row:active{background:rgba(255,255,255,.04);}
.mev-dot2{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mev-name{flex:1;font-size:12px;color:var(--text);}
.mev-del{
  padding:5px 10px;border-radius:5px;
  background:rgba(255,60,60,.1);color:#ff6060;
  border:1px solid rgba(255,60,60,.18);
  font-size:9px;font-weight:600;cursor:pointer;
  font-family:'DM Sans',sans-serif;letter-spacing:.06em;
  transition:all .15s;text-transform:uppercase;
}
.mev-del:active{background:rgba(255,60,60,.25);}

/* ── HOL CURRENT ── */
#holCurrentWrap{margin-bottom:16px;}
#holCurrent{font-size:12px;color:var(--hol-text);padding:10px 12px;background:rgba(255,60,60,.07);border-radius:8px;display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(255,60,60,0.12);gap:8px;flex-wrap:wrap;}
#holCurrent .btn{padding:6px 10px;font-size:9px;flex-shrink:0;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px) scale(0.9);opacity:0;z-index:9999;
  background:linear-gradient(135deg,var(--card2),var(--card3));
  border:1px solid var(--border3);border-radius:12px;padding:12px 20px;
  display:flex;align-items:center;gap:10px;
  font-size:13px;color:var(--text);
  transition:all .4s cubic-bezier(.34,1.4,.64,1);
  box-shadow:0 20px 50px rgba(0,0,0,.6), 0 0 0 1px var(--border);
  max-width:calc(100vw - 32px);white-space:nowrap;
}
.toast.show{transform:translateX(-50%) translateY(0) scale(1);opacity:1;}
.t-icon{font-size:16px;flex-shrink:0;}
.t-msg{flex:1;font-weight:500;font-size:12px;}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}

/* Removing animation */
@keyframes burst{0%{transform:scale(1);opacity:1;}100%{transform:scale(0);opacity:0;}}
.removing{animation:burst .18s ease forwards;}

/* ── DESKTOP ENHANCEMENTS ── */
@media(min-width:640px){
  :root{--header-h:72px;}
  .header{padding:0 32px;gap:16px;}
  .logo-emblem{width:42px;height:42px;}
  .logo-name{font-size:20px;}
  .logo-year{font-size:9px;}
  .menu-btn{display:none;}
  .header-actions{display:flex;gap:8px;align-items:center;}
  .mobile-panel{display:none !important;}
  /* Show desktop controls inline */
  .desktop-controls{display:flex;gap:8px;align-items:center;}
  .main{padding:40px 32px 100px;}
  .year-banner{margin-bottom:56px;}
  .month-header{margin-bottom:18px;padding-bottom:18px;}
  .cal-cell{padding:10px 10px 32px;min-height:110px;}
  .day-num{font-size:15px;}
  .ev-chip{font-size:9px;padding:3px 6px 3px 7px;}
  .hol-pill{font-size:8px;}
  .add-btn{width:22px;height:22px;font-size:16px;line-height:22px;}
  @media(hover:none){.add-btn{opacity:0;}}
  .cal-table th{padding:12px 6px;font-size:9px;letter-spacing:.2em;}
}

@media(min-width:1024px){
  .main{padding:48px 48px 100px;}
  .cal-cell{padding:12px 12px 34px;min-height:120px;}
  .day-num{font-size:16px;}
  .ev-chip{font-size:9.5px;}
}

/* Show/hide based on screen */
.desktop-only{display:none;}
.mobile-only{display:flex;}
@media(min-width:640px){
  .desktop-only{display:flex;}
  .mobile-only{display:none;}
}

/* Safe area for phones with notches */
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .modal{padding-bottom:calc(28px + env(safe-area-inset-bottom));}
  .toast{bottom:calc(20px + env(safe-area-inset-bottom));}
}
</style>

function autoSave(){
  try{
    localStorage.setItem('koikma_2026_v2',JSON.stringify(cal));
    dirty=false;
    document.getElementById('unsavedBadgeDesktop').classList.remove('show');
    document.getElementById('unsavedBadgeMobile').classList.remove('show');
  } catch(e){
    console.warn('Auto-save failed:',e);
  }
}

function saveData(){
  try{
    localStorage.setItem('koikma_2026_v2',JSON.stringify(cal));
    dirty=false;
    document.getElementById('unsavedBadgeDesktop').classList.remove('show');
    document.getElementById('unsavedBadgeMobile').classList.remove('show');
    showToast('💾','Saved!');
  } catch(e){
    showToast('⚠️','Save failed — storage may be blocked');
  }
}

function resetAll(){
  if(!confirm('Reset all data to default?'))return;
  cal=JSON.parse(JSON.stringify(DEFAULTS));
  localStorage.removeItem('koikma_2026_v2');
  dirty=false;
  document.getElementById('unsavedBadgeDesktop').classList.remove('show');
  document.getElementById('unsavedBadgeMobile').classList.remove('show');
  renderAll();
  showToast('↺','Reset to default');
}

/* ── Ticker ── */
function buildTicker(){
  const items=['KoIKMa 2026','May — December','NAFAS','E-INV','PERT Reviews','HRD Trainings','Labour Day · 1 May','Hari Raya Haji · 27 May','Agong Birthday · 1 Jun','Merdeka Day · 31 Aug','Malaysia Day · 16 Sep','Deepavali · 9 Nov','Christmas · 25 Dec'];
  const doubled=[...items,...items];
  const el=document.getElementById('ticker');
  el.innerHTML=doubled.map(t=>`<div class="ticker-item"><div class="dot"></div>${t}</div>`).join('');
}

/* ── Progress ── */
function updateProgress(){
  const start=new Date(2026,4,1);
  const end=new Date(2026,11,31);
  const now=new Date();
  let pct=Math.max(0,Math.min(100,((now-start)/(end-start))*100));
  document.getElementById('progFill').style.width=pct.toFixed(1)+'%';
  document.getElementById('progPct').textContent=pct.toFixed(0)+'%';
}

/* ── Key ── */
function key(year,num,day){return`${year}-${String(num).padStart(2,'0')}-${String(day).padStart(2,'0')}`;}
const today=new Date();
const todayKey=key(today.getFullYear(),today.getMonth()+1,today.getDate());

/* ── Render ── */
function renderAll(){
  const main=document.getElementById('main');
  const banner=main.querySelector('.year-banner');
  main.innerHTML='';
  if(banner)main.appendChild(banner);

  MONTHS.forEach((m,mi)=>{
    let evCount=0,holCount=0;
    for(let d=1;d<=m.days;d++){
      const k=key(m.year,m.num,d),c=cal[k];
      if(c){if(c.e&&c.e.length)evCount+=c.e.length;if(c.h)holCount++;}
    }
    const sec=document.createElement('div');
    sec.className='month-section';
    sec.style.animationDelay=(mi*.07+.15)+'s';
    sec.innerHTML=`
      <div class="month-header" style="animation-delay:${mi*.07+.15}s">
        <div class="month-name-wrap">
          <div class="month-name">${m.name}</div>
          <div class="month-ordinal">${m.year}</div>
          <div class="month-tag">${m.num<10?'0'+m.num:m.num}/${m.year}</div>
        </div>
        <div class="month-stats">
          <div class="mstat"><div class="mstat-val">${evCount}</div><div class="mstat-lbl">Events</div></div>
          <div class="mstat"><div class="mstat-val">${holCount}</div><div class="mstat-lbl">Hols</div></div>
        </div>
      </div>
      <div class="cal-wrap">
        <table class="cal-table">
          <thead><tr>
            <th>M</th><th>T</th><th>W</th><th>T</th><th>F</th>
            <th class="h-sat">S</th><th class="h-sun">S</th>
          </tr></thead>
          <tbody id="tb-${mi}"></tbody>
        </table>
      </div>
    `;
    main.appendChild(sec);

    const tbody=sec.querySelector(`#tb-${mi}`);
    let cells=[];
    for(let i=0;i<m.start;i++)cells.push(null);
    for(let d=1;d<=m.days;d++)cells.push(d);
    while(cells.length%7!==0)cells.push(null);

    for(let r=0;r<cells.length/7;r++){
      const tr=document.createElement('tr');
      for(let c=0;c<7;c++){
        const day=cells[r*7+c];
        const td=document.createElement('td');
        if(!day){
          td.className='cal-cell empty';
        }else{
          const k=key(m.year,m.num,day);
          const data=cal[k]||{h:'',e:[]};
          const isSun=c===6,isSat=c===5,hasHol=!!data.h,isToday=k===todayKey;
          td.className='cal-cell'+(isSun?' is-sun':'')+(isSat?' is-sat':'')+(hasHol?' has-hol':'')+(isToday?' is-today':'');

          const chips=(data.e||[]).map((ev,ei)=>`
            <div class="ev-chip ${ev.c}" style="animation-delay:${ei*.05}s">
              <div class="ev-dot" style="background:${DOT_MAP[ev.c]||'#94a3b8'}"></div>
              <span class="ev-label">${ev.n}</span>
              <button class="ev-del" onclick="quickDel(event,'${k}',${ei})" title="Remove">✕</button>
            </div>
          `).join('');

          td.innerHTML=`
            <span class="day-num">${day}</span>
            ${hasHol?`<div class="hol-pill">🏖<span class="hol-name">${data.h}</span><span class="hol-del" onclick="quickDelHol(event,'${k}')">✕</span></div>`:''}
            <div class="events-list">${chips}</div>
            <button class="add-btn" onclick="openModal(event,'${k}','${m.name} ${day}, ${m.year}')">+</button>
          `;
          td.addEventListener('click',()=>openModal(null,k,`${m.name} ${day}, ${m.year}`));
        }
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
  });
}

/* ── Quick delete ── */
function quickDel(e,k,idx){
  e.stopPropagation();
  const chip=e.target.closest('.ev-chip');
  if(chip){chip.classList.add('removing');setTimeout(()=>doDelEvent(k,idx),160);}
  else doDelEvent(k,idx);
}
function doDelEvent(k,idx){
  if(!cal[k])return;
  const name=cal[k].e[idx]?.n||'Event';
  cal[k].e.splice(idx,1);
  markDirty();renderAll();
  showToast('🗑','Removed: '+name);
}
function quickDelHol(e,k){
  e.stopPropagation();
  if(!cal[k])return;
  const name=cal[k].h;
  cal[k].h='';
  markDirty();renderAll();
  showToast('🗑','Removed: '+name);
}

/* ── Modal ── */
function openModal(e,k,label){
  if(e)e.stopPropagation();
  activeKey=k;
  document.getElementById('mDate').textContent=label;
  document.getElementById('evtName').value='';
  document.getElementById('holName').value='';
  selColor='ec-nafas';selDot='#2dd4a0';
  document.querySelectorAll('.col-opt').forEach(o=>o.classList.toggle('sel',o.dataset.cls===selColor));
  switchTab('add');
  document.getElementById('modal').classList.add('open');
  // Delay focus to avoid keyboard jump on mobile
  setTimeout(()=>{
    if(window.innerWidth>=640) document.getElementById('evtName').focus();
  },400);
}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function handleOverlayClick(e){if(e.target===document.getElementById('modal'))closeModal();}

function switchTab(t){
  activeTab=t;
  document.querySelectorAll('.mtab').forEach((b,i)=>{b.classList.toggle('active',['add','manage','holiday'][i]===t);});
  document.querySelectorAll('.tab-pane').forEach((p,i)=>{p.classList.toggle('active',['tab-add','tab-manage','tab-holiday'][i]==='tab-'+t);});
  if(t==='manage')renderManagePanel();
  if(t==='holiday')renderHolidayTab();
}

function renderManagePanel(){
  const panel=document.getElementById('managePanel');
  const data=cal[activeKey]||{h:'',e:[]};
  if(!data.e||!data.e.length){panel.innerHTML='';return;}
  panel.innerHTML=data.e.map((ev,i)=>`
    <div class="mev-row" id="mev-${i}">
      <div class="mev-dot2" style="background:${DOT_MAP[ev.c]||'#94a3b8'}"></div>
      <span class="mev-name">${ev.n}</span>
      <button class="mev-del" onclick="delFromPanel(${i})">✕</button>
    </div>
  `).join('');
}

function renderHolidayTab(){
  const data=cal[activeKey]||{h:'',e:[]};
  const wrap=document.getElementById('holCurrentWrap');
  if(data.h){wrap.style.display='block';document.getElementById('holCurrentText').textContent=data.h;}
  else{wrap.style.display='none';}
}

function delFromPanel(idx){
  const row=document.getElementById('mev-'+idx);
  if(row){row.classList.add('removing');setTimeout(()=>{doDelEvent(activeKey,idx);renderManagePanel();},160);}
}
function pickColor(el){
  selColor=el.dataset.cls;selDot=el.dataset.dot;
  document.querySelectorAll('.col-opt').forEach(o=>o.classList.remove('sel'));
  el.classList.add('sel');
}
function addEvent(){
  const n=document.getElementById('evtName').value.trim();
  if(!n){showToast('⚠️','Enter a name');return;}
  if(!cal[activeKey])cal[activeKey]={h:'',e:[]};
  cal[activeKey].e.push({n,c:selColor});
  markDirty();closeModal();renderAll();
  showToast('✨','Added: '+n);
}
function setHoliday(){
  const h=document.getElementById('holName').value.trim();
  if(!h){showToast('⚠️','Enter a holiday name');return;}
  if(!cal[activeKey])cal[activeKey]={h:'',e:[]};
  cal[activeKey].h=h;
  markDirty();closeModal();renderAll();
  showToast('🏖','Holiday: '+h);
}
function removeHoliday(){
  if(!cal[activeKey])return;
  const name=cal[activeKey].h;
  cal[activeKey].h='';
  markDirty();closeModal();renderAll();
  showToast('🗑','Removed: '+name);
}

/* ── Toast ── */
let toastT;
function showToast(icon,msg){
  clearTimeout(toastT);
  document.getElementById('tIcon').textContent=icon;
  document.getElementById('tMsg').textContent=msg;
  const t=document.getElementById('toast');
  t.classList.add('show');
  toastT=setTimeout(()=>t.classList.remove('show'),3000);
}

/* ── Keyboard ── */
document.addEventListener('keydown',e=>{
  if(e.key==='Escape')closeModal();
  if(e.key==='Enter'&&document.getElementById('modal').classList.contains('open')){
    if(activeTab==='add')addEvent();
    else if(activeTab==='holiday')setHoliday();
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveData();}
});

/* ── Swipe down to close modal ── */
(function(){
  let startY=0,startScroll=0;
  const overlay=document.getElementById('modal');
  const inner=document.getElementById('modalInner');
  inner.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;startScroll=inner.scrollTop;},{passive:true});
  inner.addEventListener('touchmove',e=>{
    const dy=e.touches[0].clientY-startY;
    if(dy>50&&startScroll===0){closeModal();}
  },{passive:true});
})();

/* ── Init ── */
// Check if localStorage is available
(function(){
  try{
    localStorage.setItem('_test','1');
    localStorage.removeItem('_test');
  } catch(e){
    // localStorage blocked (private browsing / iframe restriction)
    setTimeout(()=>showToast('⚠️','Storage blocked — events won\'t persist on reload'),1000);
  }
})();
buildTicker();
updateProgress();
renderAll();
</script>
