<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MangaVault Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: Outfit;
  background:#0b0b10;
  color:#fff;
}

header {
  padding:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#141420;
}

input {
  width:60%;
  padding:8px;
  border-radius:10px;
  border:none;
}

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:10px;
  padding:10px;
}

.card {
  background:#1b1b2a;
  border-radius:10px;
  overflow:hidden;
  cursor:pointer;
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.card p {
  font-size:12px;
  padding:6px;
}
</style>
</head>

<body>

<header>
  <div><b>MangaVault PRO</b></div>
  <input id="search" placeholder="Search manga...">
</header>

<div class="grid" id="grid"></div>

<script>
const API = "https://api.mangadex.org";

// 🔥 multiple proxies fallback
const PROXIES = [
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
  url => `https://corsproxy.io/?${url}`,
  url => url // direct fallback
];

async function fetchAPI(url) {
  for (let proxy of PROXIES) {
    try {
      const res = await fetch(proxy(url));
      if (!res.ok) throw new Error("fail");
      return await res.json();
    } catch (e) {
      console.log("proxy failed, trying next...");
    }
  }
  throw new Error("All proxies failed");
}

function getTitle(m) {
  return m.attributes.title.en ||
         m.attributes.title.ja ||
         Object.values(m.attributes.title)[0] ||
         "No Title";
}

function getCover(m) {
  const rel = m.relationships.find(r => r.type === "cover_art");
  if (!rel) return "";
  return `https://uploads.mangadex.org/covers/${m.id}/${rel.attributes.fileName}.256.jpg`;
}

async function loadManga() {
  const url = `${API}/manga?limit=18&includes[]=cover_art`;
  const data = await fetchAPI(url);

  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  data.data.forEach(m => {
    const div = document.createElement("div");
    div.className = "card";

    div.innerHTML = `
      <img src="${getCover(m)}" onerror="this.style.display='none'">
      <p>${getTitle(m)}</p>
    `;

    div.onclick = () => {
      window.open(`https://mangadex.org/title/${m.id}`, "_blank");
    };

    grid.appendChild(div);
  });
}

// search
document.getElementById("search").addEventListener("input", async (e) => {
  const q = e.target.value;
  if (q.length < 2) return loadManga();

  const url = `${API}/manga?title=${encodeURIComponent(q)}&limit=18&includes[]=cover_art`;
  try {
    const data = await fetchAPI(url);

    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    data.data.forEach(m => {
      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <img src="${getCover(m)}">
        <p>${getTitle(m)}</p>
      `;

      div.onclick = () => {
        window.open(`https://mangadex.org/title/${m.id}`, "_blank");
      };

      grid.appendChild(div);
    });

  } catch (err) {
    console.log(err);
  }
});

loadManga();
</script>

</body>
</html>
