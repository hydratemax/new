<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Hotel Price Compare</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #0f172a;
  color: white;
}

header {
  padding: 20px;
  text-align: center;
  background: #111827;
}

.search {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin: 20px;
}

input {
  padding: 12px;
  width: 300px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 12px 16px;
  border-radius: 8px;
  border: none;
  background: #3b82f6;
  color: white;
  cursor: pointer;
}

.container {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 15px;
  padding: 20px;
}

.card {
  background: #1f2937;
  padding: 15px;
  border-radius: 12px;
}

.price {
  margin-top: 10px;
  font-weight: bold;
  color: #10b981;
}
</style>
</head>

<body>

<header>
  <h1>Live Hotel Price Comparison</h1>
  <p>Real data from API (no fake data)</p>
</header>

<div class="search">
  <input id="city" placeholder="Enter city (e.g. Kuala Lumpur)">
  <button onclick="search()">Search</button>
</div>

<div class="container" id="results"></div>

<script>
async function search() {
  const city = document.getElementById("city").value;
  const res = await fetch(`http://localhost:3000/api/hotels?city=${city}`);
  const data = await res.json();

  const box = document.getElementById("results");
  box.innerHTML = "";

  data.forEach(hotel => {
    box.innerHTML += `
      <div class="card">
        <h3>${hotel.name}</h3>
        <p>📍 ${hotel.city}</p>
        <div class="price">From RM ${hotel.price}</div>
      </div>
    `;
  });
}
</script>

</body>
</html>
