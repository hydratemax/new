<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KoIKMa Planner 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#04070f; --bg2:#07101e; --bg3:#0b1829;
  --card:#090f1d; --card2:#0d1628; --card3:#111e32;
  --border:rgba(120,160,255,0.07); --border2:rgba(120,160,255,0.13);
  --border3:rgba(120,160,255,0.22);
  --text:#e8eeff; --text2:#5a6b96; --text3:#2a3552;
  --accent:#3a6bff; --accent2:#6a96ff; --accent3:#a0bfff;
  --gold:#d4a44c; --gold2:#eec976; --gold3:#f7e0a0;
  --sun:#ff5c5c; --sat:#ff8c42;
  --hol-text:#ff8080;
  --radius:16px; --radius-sm:10px;
  --header-h:60px;
  --c-nafas:#2dd4a0; --c-einv:#b39eff; --c-pert:#ffc850;
  --c-hrd:#7eb5ff;   --c-pink:#fb7fc6; --c-teal:#2dd4bf;
  --c-red:#f87171;   --c-gray:#94a3b8; --c-hol:#ff8080;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.03;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:200px;}

.bg-canvas{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.orb{position:absolute;border-radius:50%;mix-blend-mode:screen;animation:orbDrift linear infinite;}
.orb1{width:700px;height:700px;background:radial-gradient(circle at 40% 40%,rgba(40,80,255,.18) 0%,transparent 65%);top:-200px;left:-200px;animation-duration:38s;}
.orb2{width:550px;height:550px;background:radial-gradient(circle at 60% 60%,rgba(100,20,200,.13) 0%,transparent 65%);bottom:-150px;right:-150px;animation-duration:30s;animation-direction:reverse;}
.orb3{width:380px;height:380px;background:radial-gradient(circle,rgba(200,140,30,.09) 0%,transparent 65%);top:40%;left:45%;animation-duration:24s;animation-delay:-8s;}
@keyframes orbDrift{0%,100%{transform:translate(0,0) scale(1);}33%{transform:translate(50px,-35px) scale(1.06);}66%{transform:translate(-40px,40px) scale(.94);}}

.stars{position:fixed;inset:0;z-index:0;pointer-events:none;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.07;}50%{opacity:.55;}}

/* HEADER */
.header{position:sticky;top:0;z-index:300;height:var(--header-h);display:flex;align-items:center;gap:10px;padding:0 14px;background:rgba(4,7,15,.92);backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--border2);}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(58,107,255,.5),rgba(212,164,76,.4),transparent);animation:hShimmer 8s linear infinite;background-size:200%;}
@keyframes hShimmer{0%{background-position:0%}100%{background-position:200%}}

.logo{display:flex;align-items:center;gap:9px;flex:1;min-width:0;}
.logo-mark{width:34px;height:34px;flex-shrink:0;}
.logo-mark svg{width:100%;height:100%;}
.logo-text{display:flex;flex-direction:column;gap:1px;min-width:0;}
.logo-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;background:linear-gradient(100deg,#e8eeff,#a0bfff 45%,#d4a44c 80%,#f7e0a0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:300%;animation:lShimmer 8s linear infinite;white-space:nowrap;}
@keyframes lShimmer{0%{background-position:0%}100%{background-position:300%}}
.logo-sub{font-size:7.5px;color:var(--text2);letter-spacing:.2em;text-transform:uppercase;}

.h-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}

.unsaved-dot{width:8px;height:8px;border-radius:50%;background:var(--gold2);opacity:0;transition:opacity .3s;animation:pulseDot 1.4s ease infinite;flex-shrink:0;}
.unsaved-dot.show{opacity:1;}
@keyframes pulseDot{0%{box-shadow:0 0 0 0 rgba(212,164,76,.8);}70%{box-shadow:0 0 0 7px rgba(212,164,76,0);}100%{box-shadow:0 0 0 0 rgba(212,164,76,0);}}

.menu-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--text2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px;transition:all .2s;}
.menu-btn span{display:block;width:100%;height:1.5px;background:currentColor;border-radius:2px;transition:all .3s;}
.menu-btn.open span:nth-child(1){transform:translateY(5.5px) rotate(45deg);}
.menu-btn.open span:nth-child(2){opacity:0;}
.menu-btn.open span:nth-child(3){transform:translateY(-5.5px) rotate(-45deg);}

/* SLIDE PANEL */
.panel{position:fixed;top:var(--header-h);left:0;right:0;z-index:290;background:rgba(5,10,22,.97);backdrop-filter:blur(24px);border-bottom:1px solid var(--border2);padding:14px;transform:translateY(-110%);transition:transform .35s cubic-bezier(.22,1,.36,1);box-shadow:0 20px 50px rgba(0,0,0,.7);}
.panel.open{transform:translateY(0);}
.panel-row{display:flex;gap:8px;margin-bottom:12px;}
.panel-row .btn{flex:1;justify-content:center;}
.legend{display:flex;gap:8px;flex-wrap:wrap;}
.leg{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;font-weight:500;}
.leg-dot{width:8px;height:8px;border-radius:2px;flex-shrink:0;}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:var(--radius-sm);font-family:'DM Sans',sans-serif;font-size:10px;font-weight:600;cursor:pointer;border:none;transition:all .2s;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}
.btn:active{transform:scale(.94);}
.btn-primary{background:linear-gradient(135deg,#2a58e8,#4878ff);color:#fff;box-shadow:0 4px 18px rgba(58,107,255,.3);}
.btn-gold{background:linear-gradient(135deg,#b8882a,#d4a44c);color:#0d0800;box-shadow:0 4px 18px rgba(212,164,76,.25);}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--bg3);color:var(--text);}
.btn-danger{background:rgba(255,60,60,.08);color:#ff6060;border:1px solid rgba(255,60,60,.15);}
.btn-danger:active{background:rgba(255,60,60,.22);}

/* DESKTOP */
.desk-controls{display:none;}
.desk-unsaved{display:none;align-items:center;gap:5px;font-size:8px;color:var(--gold2);letter-spacing:.12em;text-transform:uppercase;font-weight:600;opacity:0;transition:opacity .3s;padding:4px 10px;border-radius:100px;border:1px solid rgba(212,164,76,.2);background:rgba(212,164,76,.06);}
.desk-unsaved.show{opacity:1;}
@media(min-width:640px){
  :root{--header-h:68px;}
  .header{padding:0 28px;gap:16px;}
  .logo-name{font-size:19px;}
  .menu-btn,.h-right{display:none;}
  .desk-controls{display:flex;align-items:center;gap:12px;}
  .desk-unsaved{display:flex;}
  .panel{display:none!important;}
}

/* TICKER */
.ticker{position:relative;z-index:1;height:30px;background:rgba(6,12,26,.9);border-bottom:1px solid var(--border);display:flex;align-items:center;overflow:hidden;}
.ticker-inner{display:flex;white-space:nowrap;animation:tick 60s linear infinite;}
.ticker-inner:hover{animation-play-state:paused;}
@keyframes tick{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.tick-item{display:inline-flex;align-items:center;gap:6px;padding:0 18px;font-size:8.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--text2);font-weight:500;border-right:1px solid var(--border);}
.tick-dot{width:3px;height:3px;border-radius:50%;background:var(--gold);}
.tick-fade{position:absolute;top:0;bottom:0;width:40px;pointer-events:none;z-index:2;}
.tick-fade-l{left:0;background:linear-gradient(to right,var(--bg),transparent);}
.tick-fade-r{right:0;background:linear-gradient(to left,var(--bg),transparent);}

/* PROGRESS */
.progress{position:relative;z-index:1;padding:12px 14px;display:flex;align-items:center;gap:10px;}
.prog-lbl{font-size:9px;color:var(--text2);letter-spacing:.14em;text-transform:uppercase;font-weight:500;white-space:nowrap;}
.prog-track{flex:1;height:2px;background:rgba(120,160,255,.1);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--gold));transform-origin:left;animation:progFill 1.5s cubic-bezier(.22,1,.36,1) .8s both;}
@keyframes progFill{from{transform:scaleX(0);}to{transform:scaleX(1);}}
.prog-pct{font-size:9px;color:var(--gold2);font-weight:600;white-space:nowrap;}

/* MAIN */
.main{position:relative;z-index:1;max-width:1400px;margin:0 auto;padding:20px 10px 100px;}

/* YEAR BANNER */
.year-banner{text-align:center;margin-bottom:32px;opacity:0;transform:translateY(18px);animation:revealUp .8s cubic-bezier(.22,1,.36,1) .1s forwards;}
.year-num{font-family:'Playfair Display',serif;font-size:clamp(52px,16vw,120px);font-weight:900;letter-spacing:-.03em;line-height:1;background:linear-gradient(180deg,#e8eeff 0%,rgba(100,140,255,.25) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.year-sub{font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--text2);margin-top:10px;font-weight:500;}
.year-line{width:90px;height:1px;margin:14px auto 0;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
@keyframes revealUp{to{opacity:1;transform:translateY(0);}}

/* MONTH */
.month-section{margin-bottom:40px;opacity:0;transform:translateY(28px);animation:revealUp .7s cubic-bezier(.22,1,.36,1) forwards;}
.month-header{display:flex;align-items:flex-end;justify-content:space-between;margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid var(--border);position:relative;flex-wrap:wrap;gap:6px;}
.month-header::after{content:'';position:absolute;bottom:-1px;left:0;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--gold),transparent);width:0;animation:lineGrow .8s cubic-bezier(.22,1,.36,1) forwards;animation-delay:inherit;}
@keyframes lineGrow{to{width:90px;}}
.month-name-wrap{display:flex;align-items:baseline;gap:8px;flex-wrap:wrap;}
.month-name{font-family:'Playfair Display',serif;font-size:clamp(26px,6.5vw,42px);font-weight:700;color:var(--text);letter-spacing:-.02em;line-height:1;}
.month-yr{font-family:'Playfair Display',serif;font-size:13px;font-style:italic;color:var(--text2);}
.month-tag{font-size:8.5px;font-weight:600;color:var(--accent3);background:rgba(58,107,255,.1);padding:2px 9px;border-radius:100px;letter-spacing:.08em;text-transform:uppercase;border:1px solid rgba(58,107,255,.18);}
.month-stats{display:flex;gap:14px;}
.mstat-val{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--text);line-height:1;}
.mstat-lbl{font-size:7.5px;color:var(--text2);text-transform:uppercase;letter-spacing:.14em;margin-top:2px;font-weight:500;}

/* CALENDAR */
.cal-wrap{border-radius:var(--radius);border:1px solid var(--border2);overflow:hidden;box-shadow:0 16px 50px rgba(0,0,0,.4);background:var(--card);position:relative;}
.cal-wrap::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(120,160,255,.25),transparent);pointer-events:none;z-index:2;}
.cal-table{width:100%;border-collapse:collapse;table-layout:fixed;}
.cal-table thead tr{background:linear-gradient(to bottom,rgba(58,107,255,.07),rgba(58,107,255,.02));}
.cal-table th{padding:9px 2px;font-size:8px;font-weight:600;letter-spacing:.18em;text-transform:uppercase;text-align:center;color:var(--text2);border-bottom:1px solid var(--border);}
.cal-table th.h-sat{color:var(--sat);}
.cal-table th.h-sun{color:var(--sun);}

/* CELL */
.cal-cell{
  background:var(--card);vertical-align:top;
  height:62px;padding:7px 5px 0;
  border:1px solid var(--border);
  position:relative;cursor:pointer;overflow:hidden;
  -webkit-user-select:none;user-select:none;
  transition:border-color .2s,filter .15s;
}
.cal-cell.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}
.cal-cell:active{filter:brightness(1.25);}

/* Day number */
.day-num{
  display:block;text-align:center;
  font-family:'Playfair Display',serif;
  font-size:14px;font-weight:700;color:var(--text);
  line-height:1;position:relative;z-index:1;
  transition:color .15s;
}
.cal-cell.is-sun .day-num{color:var(--sun);}
.cal-cell.is-sat .day-num{color:var(--sat);}

/* today */
.cal-cell.is-today{border-color:rgba(212,164,76,.45)!important;}
.cal-cell.is-today .day-num{
  display:inline-block;width:24px;height:24px;line-height:24px;
  text-align:center;border-radius:50%;
  background:linear-gradient(135deg,#d4a44c,#f7e0a0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin:0 auto;
}

/* Holiday red tint top */
.cal-cell.has-hol{background:linear-gradient(to bottom,rgba(255,80,80,.15) 0%,rgba(255,80,80,.05) 60%,var(--card) 100%)!important;}

/* ── COLOR BAND at bottom ── */
/* Gradient wash that fills the lower half of the cell */
.cell-color-wash{
  position:absolute;
  left:0;right:0;bottom:0;
  height:60%;          /* covers bottom 60% */
  pointer-events:none;
  z-index:0;
}

/* Solid color bars — now taller and more prominent */
.cell-bars{
  position:absolute;
  bottom:0;left:0;right:0;
  height:10px;          /* was 5px */
  display:flex;
  z-index:2;
}
.cell-bar{
  flex:1;
  height:100%;
}

/* Holiday dot top-right */
.hol-dot{position:absolute;top:5px;right:5px;width:5px;height:5px;border-radius:50%;background:var(--c-hol);box-shadow:0 0 5px rgba(255,128,128,.6);z-index:2;}

/* micro dots below day number — mobile only */
.ev-dots{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:2px;justify-content:center;z-index:3;}
.ev-micro{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

/* desktop event label chips */
.ev-labels{display:none;flex-direction:column;gap:3px;margin-top:5px;position:relative;z-index:3;}
.ev-chip{display:flex;align-items:center;gap:4px;padding:2px 5px 2px 4px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%;line-height:1.3;}
.ev-chip-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.ev-chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.hol-chip{display:none;align-items:center;gap:4px;padding:2px 5px;border-radius:4px;font-size:9px;font-weight:700;letter-spacing:.04em;background:rgba(255,128,128,.15);border:1px solid rgba(255,128,128,.25);color:#ff9999;margin-top:5px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;max-width:100%;line-height:1.3;position:relative;z-index:3;}

/* POPOVER */
.popover{
  position:fixed;z-index:400;
  background:linear-gradient(145deg,#0f1c34,#091220);
  border:1px solid var(--border3);border-radius:14px;padding:14px;
  min-width:190px;max-width:260px;
  box-shadow:0 24px 60px rgba(0,0,0,.75),0 0 0 1px rgba(120,160,255,.06);
  opacity:0;pointer-events:none;
  transform:scale(.86) translateY(8px);
  transition:opacity .22s,transform .22s cubic-bezier(.34,1.4,.64,1);
}
.popover.show{opacity:1;pointer-events:all;transform:scale(1) translateY(0);}
.popover::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(58,107,255,.5),transparent);border-radius:14px 14px 0 0;}
.pop-arrow{position:absolute;width:10px;height:10px;background:#0f1c34;border-left:1px solid var(--border3);border-top:1px solid var(--border3);}
.pop-date{font-size:9px;color:var(--text2);letter-spacing:.1em;text-transform:uppercase;margin-bottom:10px;font-weight:600;}
.pop-hol{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--hol-text);font-weight:600;background:rgba(255,80,80,.09);border:1px solid rgba(255,80,80,.18);padding:7px 9px;border-radius:8px;margin-bottom:6px;}
.pop-ev{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:8px;margin-bottom:5px;font-size:11px;font-weight:600;}
.pop-ev:last-child{margin-bottom:0;}
.pop-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.pop-name{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pop-del{font-size:9px;padding:3px 8px;border-radius:5px;cursor:pointer;border:none;font-family:'DM Sans',sans-serif;font-weight:600;letter-spacing:.06em;background:rgba(255,60,60,.12);color:#ff6060;border:1px solid rgba(255,60,60,.2);transition:all .15s;text-transform:uppercase;flex-shrink:0;}
.pop-del:active{background:rgba(255,60,60,.28);}
.pop-empty{font-size:11px;color:var(--text3);text-align:center;padding:8px 0;}
.pop-footer{display:flex;gap:6px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.pop-footer .btn{flex:1;justify-content:center;padding:8px 6px;font-size:9px;}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,0);backdrop-filter:blur(0px);display:flex;align-items:flex-end;justify-content:center;pointer-events:none;transition:background .3s,backdrop-filter .3s;}
.modal-overlay.open{background:rgba(0,0,0,.75);backdrop-filter:blur(14px);pointer-events:all;}
.modal{background:linear-gradient(145deg,#0f1c34,#09121e);border:1px solid var(--border3);border-radius:22px 22px 0 0;padding:8px 20px 28px;width:100%;max-width:520px;transform:translateY(110%);opacity:0;transition:transform .4s cubic-bezier(.22,1,.36,1),opacity .25s;box-shadow:0 -20px 60px rgba(0,0,0,.6);position:relative;overflow:hidden;max-height:92dvh;overflow-y:auto;}
.modal::before{content:'';display:block;width:36px;height:4px;background:rgba(120,160,255,.2);border-radius:2px;margin:0 auto 14px;}
.modal::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(58,107,255,.5),rgba(212,164,76,.3),transparent);pointer-events:none;}
.modal-overlay.open .modal{transform:translateY(0);opacity:1;}
@media(min-width:640px){.modal-overlay{align-items:center;}.modal{border-radius:22px;max-width:460px;max-height:88vh;}.modal::before{display:none;}}

.modal-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;color:var(--text);margin-bottom:3px;}
.modal-date{font-size:11px;color:var(--accent2);margin-bottom:18px;letter-spacing:.05em;font-weight:500;}
.fg{margin-bottom:15px;}
.flabel{display:block;font-size:9px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.18em;margin-bottom:8px;}
.finput{width:100%;padding:12px 14px;background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:'DM Sans',sans-serif;font-size:16px;outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;}
.finput:focus{border-color:var(--accent);background:rgba(58,107,255,.04);box-shadow:0 0 0 3px rgba(58,107,255,.12);}
.finput::placeholder{color:var(--text3);}

.color-grid{display:flex;gap:8px;flex-wrap:wrap;}
.col-opt{width:36px;height:36px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .2s;display:flex;align-items:center;justify-content:center;font-size:14px;color:transparent;position:relative;}
.col-opt::after{content:'';position:absolute;inset:-5px;border-radius:50%;border:2px solid transparent;transition:border-color .2s;}
.col-opt.sel{color:#fff!important;transform:scale(1.15);}
.col-opt.sel::after{border-color:rgba(255,255,255,.5);}
.col-opt:active{transform:scale(.9);}
.co-nafas{background:var(--c-nafas);}.co-einv{background:var(--c-einv);}.co-pert{background:var(--c-pert);}
.co-hrd{background:var(--c-hrd);}.co-pink{background:var(--c-pink);}.co-teal{background:var(--c-teal);}
.co-red{background:var(--c-red);}.co-gray{background:var(--c-gray);}

.modal-tabs{display:flex;margin-bottom:18px;border-radius:10px;overflow:hidden;border:1px solid var(--border2);background:rgba(255,255,255,.02);}
.mtab{flex:1;padding:10px 4px;text-align:center;font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .2s;color:var(--text2);background:transparent;border:none;font-family:'DM Sans',sans-serif;}
.mtab.active{background:linear-gradient(135deg,rgba(58,107,255,.25),rgba(58,107,255,.15));color:var(--accent3);}
.tab-pane{display:none;}
.tab-pane.active{display:block;animation:fadeSlide .2s ease;}
@keyframes fadeSlide{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

.manage-panel{background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:var(--radius-sm);padding:8px;margin-bottom:14px;max-height:200px;overflow-y:auto;}
.manage-panel:empty::after{content:'No events on this date';color:var(--text3);font-size:12px;display:block;text-align:center;padding:12px 0;}
.mev-row{display:flex;align-items:center;gap:8px;padding:8px;border-radius:7px;animation:fadeSlide .2s ease both;}
.mev-dot2{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.mev-name{flex:1;font-size:12px;color:var(--text);}
.mev-del{padding:5px 10px;border-radius:5px;background:rgba(255,60,60,.1);color:#ff6060;border:1px solid rgba(255,60,60,.18);font-size:9px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;text-transform:uppercase;}
.mev-del:active{background:rgba(255,60,60,.25);}

#holCurrentWrap{margin-bottom:14px;}
#holCurrent{font-size:12px;color:var(--hol-text);padding:10px 12px;background:rgba(255,60,60,.07);border-radius:8px;display:flex;align-items:center;justify-content:space-between;border:1px solid rgba(255,60,60,.12);gap:8px;flex-wrap:wrap;}

.modal-footer{display:flex;gap:8px;margin-top:18px;}
.modal-footer .btn{flex:1;justify-content:center;padding:12px;}

/* TOAST */
.toast{position:fixed;bottom:16px;left:50%;z-index:9999;transform:translateX(-50%) translateY(80px) scale(.92);opacity:0;background:linear-gradient(135deg,var(--card2),var(--card3));border:1px solid var(--border3);border-radius:12px;padding:11px 18px;display:flex;align-items:center;gap:9px;font-size:12px;color:var(--text);transition:all .4s cubic-bezier(.34,1.4,.64,1);box-shadow:0 16px 40px rgba(0,0,0,.6);max-width:calc(100vw - 28px);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0) scale(1);opacity:1;}
.t-icon{font-size:15px;flex-shrink:0;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
@keyframes burst{0%{transform:scale(1);opacity:1;}100%{transform:scale(0);opacity:0;}}
.removing{animation:burst .16s ease forwards;}

@media(min-width:640px){
  .main{padding:36px 28px 100px;}
  .cal-cell{height:100px;padding:10px 8px 0;}
  .day-num{font-size:15px;}
  .cell-bars{height:14px;}
  .ev-dots{display:none;}
  .ev-labels{display:flex;}
  .hol-chip{display:flex;}
  .cell-color-wash{height:65%;}
}
@media(min-width:1024px){
  .main{padding:44px 44px 100px;}
  .cal-cell{height:120px;padding:12px 10px 0;}
  .cell-bars{height:16px;}
  .ev-chip{font-size:10px;padding:3px 6px 3px 5px;}
  .cell-color-wash{height:70%;}
}
@supports(padding-bottom:env(safe-area-inset-bottom)){
  .modal{padding-bottom:calc(28px + env(safe-area-inset-bottom));}
  .toast{bottom:calc(16px + env(safe-area-inset-bottom));}
}

document.addEventListener('click',e=>{if(panelOpen&&!e.target.closest('.panel')&&!e.target.closest('.menu-btn'))closePanel();});

/* Ticker */
function buildTicker(){const items=['KoIKMa 2026','May — December','NAFAS','E-INV','PERT','HRD','Labour Day · 1 May','Hari Raya Haji · 27 May','Agong Birthday · 1 Jun','Merdeka Day · 31 Aug','Malaysia Day · 16 Sep','Deepavali · 9 Nov','Christmas · 25 Dec'];const el=document.getElementById('ticker');el.innerHTML=[...items,...items].map(t=>`<div class="tick-item"><div class="tick-dot"></div>${t}</div>`).join('');}

/* Progress */
function updateProgress(){const s=new Date(2026,4,1),e=new Date(2026,11,31),n=new Date();const p=Math.max(0,Math.min(100,((n-s)/(e-s))*100));document.getElementById('progFill').style.width=p.toFixed(1)+'%';document.getElementById('progPct').textContent=p.toFixed(0)+'%';}

/* Key / Today */
function key(y,m,d){return`${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;}
const today=new Date(),todayKey=key(today.getFullYear(),today.getMonth()+1,today.getDate());

/* Get unique colors for a date */
function getDayColors(data){
  const colors=[];
  if(data.h)colors.push({hex:'#ff8080',cls:'hol'});
  (data.e||[]).forEach(ev=>{const h=HEX[ev.c];if(h&&!colors.find(c=>c.hex===h))colors.push({hex:h,cls:ev.c});});
  return colors;
}

/* Render */
function renderAll(){
  const main=document.getElementById('main');
  const banner=main.querySelector('.year-banner');
  main.innerHTML='';if(banner)main.appendChild(banner);

  MONTHS.forEach((m,mi)=>{
    let evCount=0,holCount=0;
    for(let d=1;d<=m.days;d++){const k=key(m.year,m.num,d),c=cal[k];if(c){if(c.e&&c.e.length)evCount+=c.e.length;if(c.h)holCount++;}}
    const sec=document.createElement('div');
    sec.className='month-section';sec.style.animationDelay=(mi*.07+.12)+'s';
    sec.innerHTML=`
      <div class="month-header" style="animation-delay:${mi*.07+.12}s">
        <div class="month-name-wrap">
          <div class="month-name">${m.name}</div>
          <div class="month-yr">${m.year}</div>
          <div class="month-tag">${String(m.num).padStart(2,'0')}/${m.year}</div>
        </div>
        <div class="month-stats">
          <div style="text-align:right"><div class="mstat-val">${evCount}</div><div class="mstat-lbl">Events</div></div>
          <div style="text-align:right"><div class="mstat-val">${holCount}</div><div class="mstat-lbl">Hols</div></div>
        </div>
      </div>
      <div class="cal-wrap">
        <table class="cal-table">
          <thead><tr>
            <th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th>
            <th class="h-sat">SAT</th><th class="h-sun">SUN</th>
          </tr></thead>
          <tbody id="tb-${mi}"></tbody>
        </table>
      </div>`;
    main.appendChild(sec);

    const tbody=sec.querySelector(`#tb-${mi}`);
    let cells=[];
    for(let i=0;i<m.start;i++)cells.push(null);
    for(let d=1;d<=m.days;d++)cells.push(d);
    while(cells.length%7!==0)cells.push(null);

    for(let r=0;r<cells.length/7;r++){
      const tr=document.createElement('tr');
      for(let c=0;c<7;c++){
        const day=cells[r*7+c];
        const td=document.createElement('td');
        if(!day){
          td.className='cal-cell empty';
        }else{
          const k=key(m.year,m.num,day);
          const data=cal[k]||{h:'',e:[]};
          const isSun=c===6,isSat=c===5,hasHol=!!data.h,isToday=k===todayKey;
          const colors=getDayColors(data);
          const label=`${m.name} ${day}, ${m.year}`;

          td.className='cal-cell'+(isSun?' is-sun':'')+(isSat?' is-sat':'')+(hasHol?' has-hol':'')+(isToday?' is-today':'');

          // Gradient color wash overlay (bottom fill, fades upward)
          let washHtml='';
          if(colors.length>0&&!hasHol){
            const primary=colors[0];
            const washColor=primary.cls==='hol'?'rgba(255,128,128,0.22)':(WASH[primary.cls]||'rgba(120,160,255,0.12)');
            washHtml=`<div class="cell-color-wash" style="background:linear-gradient(to top,${washColor} 0%,${washColor.replace(/[\d.]+\)$/,'0.06)')} 50%,transparent 100%);"></div>`;
          }

          // Solid color bars at very bottom
          const bars=colors.map(c=>`<div class="cell-bar" style="background:${c.hex};opacity:0.9;"></div>`).join('');

          // Mobile: micro dots
          const dots=colors.slice(0,3).map(c=>`<div class="ev-micro" style="background:${c.hex};box-shadow:0 0 4px ${c.hex}80;"></div>`).join('');

          // Desktop: event label chips
          const chips=(data.e||[]).slice(0,3).map(ev=>{
            const hex=HEX[ev.c]||'#94a3b8';
            const bgAlpha=hex+'28';
            return `<div class="ev-chip" style="background:${bgAlpha};border:1px solid ${hex}40;color:${hex};"><div class="ev-chip-dot" style="background:${hex};"></div><span class="ev-chip-name">${ev.n}</span></div>`;
          }).join('');

          // Holiday chip for desktop
          const holChip=hasHol?`<div class="hol-chip">🏖 ${data.h}</div>`:'';

          td.innerHTML=`
            ${washHtml}
            <span class="day-num">${day}</span>
            ${hasHol?`<div class="hol-dot" title="${data.h}"></div>`:''}
            ${dots?`<div class="ev-dots">${dots}</div>`:''}
            ${holChip}
            ${chips?`<div class="ev-labels">${chips}</div>`:''}
            <div class="cell-bars">${bars}</div>
          `;

          td.addEventListener('click',e=>{e.stopPropagation();showPopover(td,k,label,data);});
        }
        tr.appendChild(td);
      }
      tbody.appendChild(tr);
    }
  });
}

/* POPOVER */
const pop=document.getElementById('popover');
function showPopover(cell,k,label,data){
  closePopover();
  popKey=k;popLabel=label;
  document.getElementById('popDate').textContent=label;

  let html='';
  if(data.h) html+=`<div class="pop-hol">🏖 <span style="flex:1">${data.h}</span><button class="pop-del" onclick="popDelHol()">✕</button></div>`;
  (data.e||[]).forEach((ev,i)=>{
    const hex=HEX[ev.c]||'#94a3b8',bg=BG[ev.c]||'rgba(71,85,105,.16)';
    html+=`<div class="pop-ev" style="background:${bg};border:1px solid ${hex}30"><div class="pop-dot" style="background:${hex}"></div><span class="pop-name" style="color:${hex}">${ev.n}</span><button class="pop-del" onclick="popDelEv(${i})">✕</button></div>`;
  });
  if(!data.h&&(!data.e||!data.e.length)) html='<div class="pop-empty">No events yet</div>';
  document.getElementById('popBody').innerHTML=html;
  document.getElementById('popAddBtn').onclick=()=>{closePopover();openModal(null,k,label);};

  pop.style.visibility='hidden';pop.classList.add('show');
  const cR=cell.getBoundingClientRect();
  const pW=pop.offsetWidth,pH=pop.offsetHeight;
  const vW=window.innerWidth,vH=window.innerHeight;

  let left=cR.left+(cR.width/2)-(pW/2);
  left=Math.max(8,Math.min(left,vW-pW-8));

  const spaceBelow=vH-cR.bottom-12,spaceAbove=cR.top-12;
  let top,arrowDir;
  if(spaceBelow>=pH||spaceBelow>=spaceAbove){top=cR.bottom+10;arrowDir='top';}
  else{top=cR.top-pH-10;arrowDir='bottom';}
  top=Math.max(8,Math.min(top,vH-pH-8));

  pop.style.left=left+'px';pop.style.top=top+'px';pop.style.visibility='';

  const arrow=document.getElementById('popArrow');
  const aLeft=(cR.left+cR.width/2)-left;
  arrow.style.left=Math.max(14,Math.min(aLeft,pW-20))+'px';
  if(arrowDir==='top'){arrow.style.top='-6px';arrow.style.bottom='';arrow.style.transform='translateX(-50%) rotate(45deg)';}
  else{arrow.style.bottom='-6px';arrow.style.top='';arrow.style.transform='translateX(-50%) rotate(225deg)';}
}

function closePopover(){pop.classList.remove('show');popKey=null;}
function popDelHol(){if(!popKey||!cal[popKey])return;const n=cal[popKey].h;cal[popKey].h='';markDirty();renderAll();closePopover();showToast('🗑','Removed: '+n);}
function popDelEv(idx){if(!popKey||!cal[popKey])return;const n=cal[popKey].e[idx]?.n||'Event';cal[popKey].e.splice(idx,1);markDirty();renderAll();closePopover();showToast('🗑','Removed: '+n);}

document.addEventListener('click',e=>{if(pop.classList.contains('show')&&!pop.contains(e.target)&&!e.target.closest('.cal-cell'))closePopover();});

/* MODAL */
function openModal(e,k,label){if(e)e.stopPropagation();activeKey=k;document.getElementById('mDate').textContent=label;document.getElementById('evtName').value='';document.getElementById('holName').value='';selColor='ec-nafas';document.querySelectorAll('.col-opt').forEach(o=>o.classList.toggle('sel',o.dataset.cls===selColor));switchTab('add');document.getElementById('modal').classList.add('open');setTimeout(()=>{if(window.innerWidth>=640)document.getElementById('evtName').focus();},380);}
function closeModal(){document.getElementById('modal').classList.remove('open');}
function handleOverlayClick(e){if(e.target===document.getElementById('modal'))closeModal();}

function switchTab(t){activeTab=t;document.querySelectorAll('.mtab').forEach((b,i)=>b.classList.toggle('active',['add','manage','holiday'][i]===t));document.querySelectorAll('.tab-pane').forEach((p,i)=>p.classList.toggle('active',['tab-add','tab-manage','tab-holiday'][i]==='tab-'+t));if(t==='manage')renderManagePanel();if(t==='holiday')renderHolidayTab();}

function renderManagePanel(){const panel=document.getElementById('managePanel');const data=cal[activeKey]||{h:'',e:[]};if(!data.e||!data.e.length){panel.innerHTML='';return;}panel.innerHTML=data.e.map((ev,i)=>`<div class="mev-row"><div class="mev-dot2" style="background:${HEX[ev.c]||'#94a3b8'}"></div><span class="mev-name">${ev.n}</span><button class="mev-del" onclick="delFromPanel(${i})">✕</button></div>`).join('');}
function renderHolidayTab(){const data=cal[activeKey]||{h:'',e:[]};const wrap=document.getElementById('holCurrentWrap');if(data.h){wrap.style.display='block';document.getElementById('holCurrentText').textContent=data.h;}else wrap.style.display='none';}
function delFromPanel(idx){if(!cal[activeKey])return;cal[activeKey].e.splice(idx,1);markDirty();renderAll();renderManagePanel();showToast('🗑','Event removed');}
function pickColor(el){selColor=el.dataset.cls;document.querySelectorAll('.col-opt').forEach(o=>o.classList.remove('sel'));el.classList.add('sel');}
function addEvent(){const n=document.getElementById('evtName').value.trim();if(!n){showToast('⚠️','Enter a name');return;}if(!cal[activeKey])cal[activeKey]={h:'',e:[]};cal[activeKey].e.push({n,c:selColor});markDirty();closeModal();renderAll();showToast('✨','Added: '+n);}
function setHoliday(){const h=document.getElementById('holName').value.trim();if(!h){showToast('⚠️','Enter a holiday name');return;}if(!cal[activeKey])cal[activeKey]={h:'',e:[]};cal[activeKey].h=h;markDirty();closeModal();renderAll();showToast('🏖','Holiday: '+h);}
function removeHoliday(){if(!cal[activeKey])return;cal[activeKey].h='';markDirty();closeModal();renderAll();showToast('🗑','Holiday removed');}

/* Toast */
let toastT;
function showToast(icon,msg){clearTimeout(toastT);document.getElementById('tIcon').textContent=icon;document.getElementById('tMsg').textContent=msg;const t=document.getElementById('toast');t.classList.add('show');toastT=setTimeout(()=>t.classList.remove('show'),3000);}

/* Keyboard */
document.addEventListener('keydown',e=>{if(e.key==='Escape'){closeModal();closePopover();}if(e.key==='Enter'&&document.getElementById('modal').classList.contains('open')){if(activeTab==='add')addEvent();else if(activeTab==='holiday')setHoliday();}if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveData();}});

/* Swipe down to close modal */
(()=>{let sy=0,ss=0;const inner=document.getElementById('modalInner');inner.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;ss=inner.scrollTop;},{passive:true});inner.addEventListener('touchmove',e=>{if(e.touches[0].clientY-sy>55&&ss===0)closeModal();},{passive:true});})();

/* Storage check */
(()=>{try{localStorage.setItem('_t','1');localStorage.removeItem('_t');}catch(e){setTimeout(()=>showToast('⚠️','Storage blocked — open as local file'),1200);}})();

buildTicker();updateProgress();renderAll();
</script>
</body>
