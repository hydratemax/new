<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>MangaNato Reader</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

:root {
  --bg:      #111114;
  --surface: #1c1c1f;
  --card:    #232328;
  --border:  rgba(255,255,255,.08);
  --accent:  #ff6730;
  --text:    #f0f0f3;
  --sub:     #888894;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bot: env(safe-area-inset-bottom, 0px);
  --topbar:  56px;
  --botbar:  60px;
}

html, body {
  height: 100%; overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: 'Inter', -apple-system, sans-serif;
}

/* ── Topbar ── */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 80;
  height: calc(var(--topbar) + var(--safe-top));
  padding-top: var(--safe-top);
  background: rgba(17,17,20,.94);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 8px;
  padding-left: 12px; padding-right: 12px;
}
.logo {
  font-size: 17px; font-weight: 700; white-space: nowrap; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), #ffaa55);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
#sbox {
  flex: 1; display: flex; align-items: center;
  background: var(--card); border-radius: 10px;
  border: 1px solid var(--border); overflow: hidden;
}
#sbox input {
  flex: 1; padding: 8px 10px; background: none; border: none;
  outline: none; color: var(--text); font-size: 14px; font-family: inherit;
}
#sbox input::placeholder { color: var(--sub); }
#sbox button {
  background: none; border: none; padding: 8px 12px;
  color: var(--accent); font-size: 16px; cursor: pointer;
}

/* ── Bottom nav ── */
#botnav {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 80;
  height: calc(var(--botbar) + var(--safe-bot));
  padding-bottom: var(--safe-bot);
  background: rgba(17,17,20,.97);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
}
.btab {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 2px;
  background: none; border: none; cursor: pointer;
  color: var(--sub); font-size: 10px; font-weight: 600;
  letter-spacing: .2px; transition: color .15s;
}
.btab .bi { font-size: 22px; line-height: 1; }
.btab.active { color: var(--accent); }

/* ── Screens ── */
.screen {
  position: fixed; inset: 0;
  padding-top: calc(var(--topbar) + var(--safe-top) + 10px);
  padding-bottom: calc(var(--botbar) + var(--safe-bot) + 8px);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  display: none;
}
.screen.active { display: block; }

.sec-label {
  font-size: 11px; font-weight: 700; color: var(--sub);
  text-transform: uppercase; letter-spacing: .7px;
  padding: 2px 13px 10px;
}

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px; padding: 0 10px 6px;
}

.card {
  position: relative; border-radius: 8px;
  background: var(--card); overflow: hidden;
  cursor: pointer; aspect-ratio: 2/3;
  transition: transform .12s;
}
.card:active { transform: scale(.95); }
.card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card .noimg {
  width: 100%; height: 100%;
  background: linear-gradient(150deg,#2b2b32,#1a1a20);
  display: flex; align-items: center; justify-content: center; font-size: 30px;
}
.card .grad {
  position: absolute; bottom: 0; left: 0; right: 0; height: 70%;
  background: linear-gradient(transparent, rgba(0,0,0,.92));
}
.card .ctitle {
  position: absolute; bottom: 0; left: 0; right: 0;
  padding: 6px; font-size: 10px; font-weight: 600; line-height: 1.3; color: #fff;
}
.card .chip {
  position: absolute; top: 5px; left: 5px;
  background: var(--accent); color: #fff;
  font-size: 8px; font-weight: 700; padding: 2px 5px; border-radius: 4px;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(8px); }
  to   { opacity:1; transform:translateY(0); }
}
.card { animation: fadeUp .28s ease both; }

.loader {
  grid-column: 1/-1;
  display: flex; align-items: center; justify-content: center;
  gap: 10px; padding: 52px 20px; color: var(--sub); font-size: 13px;
  text-align: center; flex-direction: column; line-height: 1.6;
}
.spin {
  width: 18px; height: 18px; border-radius: 50%;
  border: 2px solid var(--card); border-top-color: var(--accent);
  animation: spin .65s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; gap: 10px; padding: 64px 24px;
  color: var(--sub); text-align: center;
}
.empty .ei { font-size: 46px; }
.empty p { font-size: 13px; line-height: 1.55; }

/* ── Detail panel ── */
#detail {
  position: fixed; inset: 0; z-index: 150;
  background: var(--bg); overflow-y: auto; -webkit-overflow-scrolling: touch;
  transform: translateX(100%);
  transition: transform .26s cubic-bezier(.4,0,.2,1);
}
#detail.open { transform: translateX(0); }

.d-hero { position: relative; height: 220px; overflow: hidden; }
.d-bg {
  width: 100%; height: 100%; object-fit: cover;
  filter: blur(22px) brightness(.28); transform: scale(1.2);
}
.d-toprow {
  position: absolute; top: 0; left: 0; right: 0;
  padding: calc(var(--safe-top) + 10px) 14px 0;
}
.back {
  width: 34px; height: 34px; border-radius: 50%;
  background: rgba(0,0,0,.5); border: none; color: #fff;
  font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
}
.d-foot {
  position: absolute; bottom: 0; left: 0; right: 0;
  display: flex; gap: 12px; padding: 14px;
  background: linear-gradient(transparent, var(--bg));
}
.d-cover {
  width: 86px; flex-shrink: 0; border-radius: 8px;
  box-shadow: 0 6px 20px rgba(0,0,0,.65);
  object-fit: cover; aspect-ratio: 2/3;
}
.d-info { display: flex; flex-direction: column; justify-content: flex-end; gap: 5px; }
.d-title { font-size: 15px; font-weight: 700; line-height: 1.25; }
.d-author { font-size: 11px; color: var(--sub); }
.d-status {
  display: inline-flex; padding: 2px 8px; border-radius: 20px;
  font-size: 10px; font-weight: 700; width: fit-content;
  background: rgba(255,103,48,.15); color: var(--accent);
  border: 1px solid rgba(255,103,48,.3);
}

.d-acts { display: flex; gap: 8px; padding: 12px 13px 6px; }
.btn-r {
  flex: 1; padding: 13px; border-radius: 10px; border: none;
  background: var(--accent); color: #fff;
  font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
}
.btn-r:active { filter: brightness(.88); }
.btn-l {
  padding: 13px 15px; border-radius: 10px;
  border: 1px solid var(--border); background: var(--card);
  color: var(--text); font-family: inherit; font-size: 14px; font-weight: 700; cursor: pointer;
}
.btn-l.saved { background: rgba(255,103,48,.14); border-color: rgba(255,103,48,.35); color: var(--accent); }

.d-genres { display: flex; flex-wrap: wrap; gap: 5px; padding: 2px 13px 10px; }
.gtag {
  padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 600;
  background: var(--card); color: var(--sub); border: 1px solid var(--border);
}

.d-desc {
  padding: 0 13px 6px; font-size: 13px; color: var(--sub); line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden;
}
.d-desc.exp { -webkit-line-clamp: unset; }
.more-btn {
  display: none; background: none; border: none;
  color: var(--accent); font-size: 12px; font-weight: 600;
  cursor: pointer; padding: 0 13px 10px; text-align: left;
}

.d-ch-hdr {
  display: flex; justify-content: space-between; align-items: center;
  padding: 10px 13px 8px; border-top: 1px solid var(--border);
  font-size: 14px; font-weight: 700;
}
.ch-cnt { font-size: 12px; font-weight: 500; color: var(--sub); }

.ch-list { list-style: none; }
.ch-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 13px; cursor: pointer;
  border-bottom: 1px solid rgba(255,255,255,.04);
  transition: background .1s;
}
.ch-item:active { background: var(--card); }
.ch-item.read .ch-num { color: var(--sub); }
.ch-l { display: flex; flex-direction: column; gap: 2px; }
.ch-num { font-size: 14px; font-weight: 600; }
.ch-date { font-size: 11px; color: var(--sub); }
.ch-arr { color: var(--sub); font-size: 16px; }

/* ── Reader ── */
#reader {
  position: fixed; inset: 0; z-index: 200;
  background: #000; display: flex; flex-direction: column;
  transform: translateX(100%);
  transition: transform .26s cubic-bezier(.4,0,.2,1);
}
#reader.open { transform: translateX(0); }

#r-top {
  position: absolute; top: 0; left: 0; right: 0; z-index: 10;
  padding: calc(var(--safe-top) + 8px) 13px 14px;
  background: linear-gradient(rgba(0,0,0,.88), transparent);
  display: flex; align-items: center; gap: 10px;
  transition: opacity .2s;
}
#r-top.hide { opacity: 0; pointer-events: none; }
#r-title { flex: 1; font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

#r-pages { flex: 1; overflow-y: scroll; -webkit-overflow-scrolling: touch; }
#r-pages img { display: block; width: 100%; max-width: 720px; margin: 0 auto; }

#r-bot {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
  padding: 14px 13px calc(var(--safe-bot) + 14px);
  background: linear-gradient(transparent, rgba(0,0,0,.88));
  display: flex; align-items: center; gap: 10px;
  transition: opacity .2s;
}
#r-bot.hide { opacity: 0; pointer-events: none; }
.rbtn {
  padding: 9px 18px; border-radius: 8px;
  border: 1px solid rgba(255,255,255,.2);
  background: rgba(255,255,255,.1); color: #fff;
  font-family: inherit; font-size: 13px; font-weight: 600; cursor: pointer;
}
.rbtn:disabled { opacity: .3; pointer-events: none; }
#r-inf { flex: 1; text-align: center; font-size: 12px; color: rgba(255,255,255,.5); font-weight: 500; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div id="topbar">
  <div class="logo">📖 MNato</div>
  <div id="sbox">
    <input id="q" placeholder="Search manga…" autocomplete="off"
           onkeydown="if(event.key==='Enter')doSearch()">
    <button onclick="doSearch()">🔍</button>
  </div>
</div>

<!-- SCREENS -->
<div id="s-home" class="screen active">
  <div class="sec-label">Latest Updates</div>
  <div id="home-grid" class="grid">
    <div class="loader"><div class="spin"></div> Loading…</div>
  </div>
</div>

<div id="s-library" class="screen">
  <div class="sec-label">My Library</div>
  <div id="lib-grid" class="grid"></div>
  <div id="lib-empty" class="empty">
    <div class="ei">📚</div>
    <p>Your library is empty.<br>Tap ♡ on any manga to save it.</p>
  </div>
</div>

<div id="s-search" class="screen">
  <div class="sec-label" id="srch-label">Results</div>
  <div id="srch-grid" class="grid"></div>
</div>

<!-- BOTTOM NAV -->
<div id="botnav">
  <button class="btab active" onclick="goTab('home',this)">
    <span class="bi">🏠</span>Home
  </button>
  <button class="btab" onclick="goTab('library',this)">
    <span class="bi">📚</span>Library
  </button>
</div>

<!-- DETAIL PANEL -->
<div id="detail">
  <div class="d-hero">
    <img id="d-bg" src="" alt="" class="d-bg">
    <div class="d-toprow"><button class="back" onclick="closeDetail()">←</button></div>
    <div class="d-foot">
      <img id="d-cover" src="" alt="" class="d-cover">
      <div class="d-info">
        <div id="d-title" class="d-title">—</div>
        <div id="d-author" class="d-author"></div>
        <div id="d-status" class="d-status"></div>
      </div>
    </div>
  </div>
  <div class="d-acts">
    <button class="btn-r" onclick="startRead()">▶ Read Now</button>
    <button class="btn-l" id="lib-btn" onclick="toggleLib()">♡ Library</button>
  </div>
  <div id="d-genres" class="d-genres"></div>
  <div id="d-desc" class="d-desc"></div>
  <button class="more-btn" id="more-btn" onclick="toggleDesc()">Show more</button>
  <div class="d-ch-hdr">
    <span>Chapters</span>
    <span class="ch-cnt" id="ch-cnt"></span>
  </div>
  <ul id="ch-list" class="ch-list">
    <li class="loader"><div class="spin"></div> Loading chapters…</li>
  </ul>
</div>

<!-- READER -->
<div id="reader">
  <div id="r-top">
    <button class="back" style="background:rgba(255,255,255,.14)" onclick="closeReader()">←</button>
    <div id="r-title">Loading…</div>
  </div>
  <div id="r-pages">
    <div class="loader"><div class="spin"></div> Loading pages…</div>
  </div>
  <div id="r-bot">
    <button class="rbtn" id="r-prev" onclick="navCh(-1)">‹ Prev</button>
    <div id="r-inf">—</div>
    <button class="rbtn" id="r-next" onclick="navCh(1)">Next ›</button>
  </div>
</div>

<script>
const API = "https://manga-app-fjwl.onrender.com";

let library  = JSON.parse(localStorage.getItem("mn_lib")  || "{}");
let progress = JSON.parse(localStorage.getItem("mn_prog") || "{}");
let curManga = null;
let curChaps = [];
let curChIdx = 0;
let descExp  = false;

const px  = url => url ? `${API}/proxy?url=${encodeURIComponent(url)}` : "";
const esc = s => String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const $   = id => document.getElementById(id);

async function get(path) {
  const r = await fetch(API + path);
  if (!r.ok) throw new Error(`HTTP ${r.status}`);
  return r.json();
}

/* ── tabs ── */
function goTab(tab, el) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".btab").forEach(b => b.classList.remove("active"));
  $("s-" + tab).classList.add("active");
  el.classList.add("active");
  if (tab === "library") renderLib();
}

/* ── search ── */
async function doSearch() {
  const q = $("q").value.trim();
  if (!q) return;
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".btab").forEach(b => b.classList.remove("active"));
  $("s-search").classList.add("active");
  $("srch-label").textContent = `Results for "${q}"`;
  $("srch-grid").innerHTML = `<div class="loader"><div class="spin"></div> Searching…</div>`;
  try {
    const d = await get(`/search?q=${encodeURIComponent(q)}`);
    renderGrid($("srch-grid"), d.results || []);
  } catch(e) {
    $("srch-grid").innerHTML = `<div class="loader" style="color:#f66">Search failed — ${e.message}</div>`;
  }
}

/* ── home ── */
async function loadHome() {
  try {
    const d = await get("/latest");
    renderGrid($("home-grid"), d.results || []);
  } catch(e) {
    $("home-grid").innerHTML = `<div class="loader" style="color:#f66">
      Failed to load<br><small style="opacity:.55;font-size:11px">${e.message}</small>
    </div>`;
  }
}

/* ── render grid ── */
function renderGrid(container, items) {
  container.innerHTML = "";
  if (!items.length) {
    container.innerHTML = `<div class="loader">No results found.</div>`; return;
  }
  items.forEach((m, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = `${Math.min(i * 0.03, 0.45)}s`;
    const src = m.cover ? px(m.cover) : "";
    card.innerHTML = `
      ${src ? `<img src="${src}" alt="" loading="lazy"
        onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">` : ""}
      <div class="noimg" style="display:${src?"none":"flex"}">📖</div>
      <div class="grad"></div>
      <div class="ctitle">${esc(m.title)}</div>
      ${m.latestCh ? `<div class="chip">${esc(m.latestCh.replace(/chapter/i,"Ch.").trim().slice(0,12))}</div>` : ""}`;
    card.onclick = () => openDetail(m);
    container.appendChild(card);
  });
}

/* ── detail ── */
async function openDetail(manga) {
  curManga = manga; curChaps = []; descExp = false;
  const csrc = manga.cover ? px(manga.cover) : "";
  $("d-bg").src = csrc;
  $("d-cover").src = csrc;
  $("d-title").textContent = manga.title;
  $("d-author").textContent = "";
  $("d-status").textContent = "";
  $("d-genres").innerHTML = "";
  $("d-desc").textContent = "Loading…";
  $("d-desc").classList.remove("exp");
  $("more-btn").style.display = "none";
  $("ch-list").innerHTML = `<li class="loader"><div class="spin"></div> Loading…</li>`;
  $("ch-cnt").textContent = "";
  updateLibBtn();
  $("detail").classList.add("open");
  $("detail").scrollTop = 0;

  try {
    const d = await get(`/manga?id=${manga.id}`);
    curChaps = d.chapters || [];
    $("d-title").textContent = d.title || manga.title;
    $("d-author").textContent = d.author ? `by ${d.author}` : "";
    $("d-status").textContent = d.status || "";
    $("d-genres").innerHTML = (d.genres||[]).slice(0,8)
      .map(g => `<span class="gtag">${esc(g)}</span>`).join("");
    const descEl = $("d-desc");
    descEl.textContent = d.desc || "No description available.";
    requestAnimationFrame(() => {
      if (descEl.scrollHeight > descEl.clientHeight + 4)
        $("more-btn").style.display = "block";
    });
    $("ch-cnt").textContent = `${curChaps.length} ch`;
    renderChapters();
  } catch(e) {
    $("d-desc").textContent = "Failed to load details.";
    $("ch-list").innerHTML = `<li class="loader" style="color:#f66">Error: ${e.message}</li>`;
  }
}

function closeDetail() { $("detail").classList.remove("open"); }

function toggleDesc() {
  descExp = !descExp;
  $("d-desc").classList.toggle("exp", descExp);
  $("more-btn").textContent = descExp ? "Show less" : "Show more";
}

function renderChapters() {
  const ul = $("ch-list"); ul.innerHTML = "";
  if (!curChaps.length) {
    ul.innerHTML = `<li class="loader">No chapters found.</li>`; return;
  }
  curChaps.forEach((c, i) => {
    const li = document.createElement("li");
    li.className = "ch-item" + (isRead(c.id) ? " read" : "");
    li.innerHTML = `
      <div class="ch-l">
        <div class="ch-num">${esc(c.title)}</div>
        ${c.date ? `<div class="ch-date">${esc(c.date)}</div>` : ""}
      </div>
      <div class="ch-arr">›</div>`;
    li.onclick = () => openReader(i);
    ul.appendChild(li);
  });
}

/* ── library ── */
function toggleLib() {
  if (!curManga) return;
  const id = curManga.id;
  if (library[id]) delete library[id];
  else library[id] = { id: curManga.id, title: curManga.title, cover: curManga.cover };
  localStorage.setItem("mn_lib", JSON.stringify(library));
  updateLibBtn();
}
function updateLibBtn() {
  const s = !!(curManga && library[curManga.id]);
  $("lib-btn").textContent = s ? "♥ Saved" : "♡ Library";
  $("lib-btn").classList.toggle("saved", s);
}
function renderLib() {
  const items = Object.values(library);
  $("lib-empty").style.display = items.length ? "none" : "flex";
  if (items.length) renderGrid($("lib-grid"), items);
  else $("lib-grid").innerHTML = "";
}
function startRead() { if (curChaps.length) openReader(0); }

/* ── reader ── */
async function openReader(idx) {
  curChIdx = idx;
  const ch = curChaps[idx];
  if (!ch) return;

  $("reader").classList.add("open");
  $("r-pages").innerHTML = `<div class="loader"><div class="spin"></div> Loading pages…</div>`;
  $("r-title").textContent = `${curManga?.title||""} · ${ch.title}`;
  $("r-top").classList.remove("hide");
  $("r-bot").classList.remove("hide");
  updateNav();

  // tap anywhere on pages = toggle bars
  $("r-pages").onclick = (e) => {
    if (e.target.tagName === "IMG") {
      const top = $("r-top"); const bot = $("r-bot");
      const hidden = top.classList.contains("hide");
      top.classList.toggle("hide", !hidden);
      bot.classList.toggle("hide", !hidden);
    }
  };

  try {
    const d = await get(`/pages?id=${ch.id}`);
    const imgs = d.images || [];
    $("r-pages").innerHTML = "";
    if (!imgs.length) {
      $("r-pages").innerHTML = `<div class="loader" style="color:#f66">No pages found for this chapter.</div>`;
      return;
    }
    imgs.forEach((src, i) => {
      const img = document.createElement("img");
      img.src = px(src);
      img.alt = `Page ${i+1}`;
      img.loading = i < 5 ? "eager" : "lazy";
      $("r-pages").appendChild(img);
    });
    $("r-pages").scrollTop = 0;
    markRead(ch.id);
    renderChapters();
  } catch(e) {
    $("r-pages").innerHTML = `<div class="loader" style="color:#f66">Failed to load pages — ${e.message}</div>`;
  }
}

function updateNav() {
  $("r-prev").disabled = curChIdx <= 0;
  $("r-next").disabled = curChIdx >= curChaps.length - 1;
  $("r-inf").textContent = curChaps[curChIdx]?.title || "—";
}
function navCh(dir) {
  const n = curChIdx + dir;
  if (n >= 0 && n < curChaps.length) openReader(n);
}
function closeReader() { $("reader").classList.remove("open"); }

/* ── read tracking ── */
function isRead(id) { return !!(curManga && progress[curManga.id]?.includes(id)); }
function markRead(id) {
  if (!curManga) return;
  if (!progress[curManga.id]) progress[curManga.id] = [];
  if (!progress[curManga.id].includes(id)) progress[curManga.id].push(id);
  localStorage.setItem("mn_prog", JSON.stringify(progress));
}

/* ── init ── */
loadHome();
</script>
</body>
</html>
